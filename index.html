                                </div>
                            </div>

                            {/* ABA ESTRATÉGICA: PLANILHA DE CONFRONTAMENTO DE CMV (ALVO 35%) */}
                            {activeTab === 'relatorio_unificado' && (() => {
                                const totalFixedCosts = fixedCosts.reduce((s,c)=>s+p(c.value),0);
                                const cmvGeral = (() => { 
                                    let sumCmv = 0, count = 0; 
                                    [...recipes, ...complements, ...combos].forEach(item => { 
                                        if (!item.ignoreCMV) { 
                                            const cost = item.ingredients ? calcItemCost(item.ingredients) : calcComboCost(item.items); 
                                            const sp = p(item.sellingPrice); 
                                            if(sp>0){ sumCmv += (cost/sp)*100; count++; } 
                                        } 
                                    }); 
                                    return count > 0 ? (sumCmv/count).toFixed(1) : 0; 
                                })();
                                
                                let mPix = 0, mPixOn = 0, mDinheiro = 0, mIfood = 0, mDebito = 0, mCredito = 0, mFiado = 0, mVR = 0, mTicket = 0, mAlelo = 0, mMotoboy = 0, mTaxaEntrega = 0;
                                salesDays.forEach(d => {
                                    const r = dailyRecords[d] || {};
                                    mPix += p(r.pix); mPixOn += p(r.pixOnline); mDinheiro += p(r.dinheiro); mIfood += p(r.ifood);
                                    mDebito += p(r.debito); mCredito += p(r.credito); mFiado += p(r.fiado); mVR += p(r.vr);
                                    mTicket += p(r.ticket); mAlelo += p(r.alelo); mMotoboy += p(r.motoboy); mTaxaEntrega += p(r.taxaEntrega);
                                });

                                // Faturamento TOTAL APENAS das vendas do caixa diário
                                const faturamentoTotal = mPix + mPixOn + mDinheiro + mIfood + mDebito + mCredito + mFiado + mVR + mTicket + mAlelo;
                                
                                // O usuário quer que CMV seja os Insumos/Embalagens do Financeiro
                                let custoRealInsumosFinanceiro = 0;
                                let taxasFinanceiroManuais = 0;
                                let motoboyFinanceiroExtra = 0;
                                let totalCustosFixosDRE = 0;
                                let listaCustosFixos = [];

                                const cmvKeywords = ['insumo', 'embalagem', 'mercadoria', 'compra', 'hortifruti', 'açougue', 'acougue', 'padaria', 'bebida', 'cmv', 'ingrediente', 'fornecedor', 'estoque', 'alimento', 'carne', 'pão', 'pao', 'queijo', 'gás', 'gas', 'refrigerante', 'suco'];
                                const taxaKeywords = ['taxa', 'bancária', 'bancaria', 'tarifa', 'maquininha', 'juros'];
                                const entregaKeywords = ['motoboy', 'entrega', 'frete', 'logistica', 'logística', 'entregador', 'combustível', 'gasolina'];

                                Object.entries(stats.catCosts).forEach(([cat, val]) => {
                                    const c = cat.toLowerCase();
                                    // Ignora as taxas automáticas que eu já separo abaixo
                                    if (c === 'taxas de cartão (auto vendas)') return;

                                    if (cmvKeywords.some(k => c.includes(k))) {
                                        custoRealInsumosFinanceiro += val;
                                    } else if (taxaKeywords.some(k => c.includes(k))) {
                                        taxasFinanceiroManuais += val;
                                    } else if (entregaKeywords.some(k => c.includes(k))) {
                                        motoboyFinanceiroExtra += val;
                                    } else {
                                        // É um custo fixo / operacional
                                        totalCustosFixosDRE += val;
                                        listaCustosFixos.push({ desc: cat, val: val });
                                    }
                                });

                                // Se não houver nada lançado com essas palavras no financeiro, usa a teórica como fallback de segurança
                                const custoInsumos = custoRealInsumosFinanceiro > 0 ? custoRealInsumosFinanceiro : (faturamentoTotal * (p(cmvGeral) / 100));
                                const cmvRealFinanceiroPercent = faturamentoTotal > 0 ? (custoInsumos / faturamentoTotal) * 100 : 0;

                                const impostosEstimados = faturamentoTotal * (p(cmvSettings.tax) / 100);
                                const taxasCartaoAutomaticas = (mDebito * (p(cmvSettings.taxaDebito)/100)) + (mCredito * (p(cmvSettings.taxaCredito)/100));
                                const totalCustosVariaveis = custoInsumos + impostosEstimados + taxasCartaoAutomaticas + mMotoboy + mTaxaEntrega;
                                const marginVal = faturamentoTotal - totalCustosVariaveis;

                                return (
                                    <div className="space-y-4 fade-in print-area" id="print-area">
                                        <div className="flex justify-between items-center bg-[#1A202C] text-white p-4 rounded-xl shadow print:shadow-none print:bg-white print:text-black print:border-b-2 print:border-black">
                                            <div>
                                                <h2 className="text-lg font-black uppercase tracking-wider text-[#F8CC82] print:text-black">Relatório Unificado Estratégico</h2>
                                                <p className="text-[8px] text-slate-400 mt-1 uppercase print:text-slate-500">Fusão inteligente entre métricas de CMV de engenharia de cardápio e fluxo de caixa financeiro</p>
                                            </div>
                                            <button type="button" onClick={()=>window.print()} className="bg-[#F27A18] text-black px-4 py-2 rounded-lg font-black text-[9px] uppercase print:hidden"><Icon name="printer" size={12} className="inline mr-1"/> Imprimir PDF</button>
                                        </div>

                                        {/* KPIs Unificados Finanças + CMV */}
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 print:hidden">
                                            <div className="glass-card p-4 rounded-xl border-l-4 border-blue-500 text-center">
                                                <span className="text-[8px] font-black text-slate-400 block uppercase">Faturamento Bruto (Caixa)</span>
                                                <h3 className="text-xl font-black text-slate-800 mt-1">{formatMoney(faturamentoTotal)}</h3>
                                            </div>
                                            <div className="glass-card p-4 rounded-xl border-l-4 border-emerald-500 text-center">
                                                <span className="text-[8px] font-black text-slate-400 block uppercase">Margem de Contribuição Bruta</span>
                                                <h3 className="text-xl font-black text-emerald-600 mt-1">{faturamentoTotal > 0 ? ((marginVal/faturamentoTotal)*100).toFixed(1) : 0}%</h3>
                                            </div>
                                            <div className="glass-card p-4 rounded-xl border-l-4 border-orange-500 text-center">
                                                <span className="text-[8px] font-black text-slate-400 block uppercase">CMV Real Financeiro</span>
                                                <h3 className="text-xl font-black text-orange-600 mt-1">{cmvRealFinanceiroPercent.toFixed(1)}%</h3>
                                                <span className="text-[8px] text-slate-400 block font-bold mt-1">Alvo Operacional: {cmvSettings.targetCMV}%</span>
                                            </div>
                                            <div className="glass-card p-4 rounded-xl border-l-4 border-purple-500 text-center">
                                                <span className="text-[8px] font-black text-slate-400 block uppercase">Resultado Estratégico (NET)</span>
                                                <h3 className={`text-xl font-black mt-1 ${(marginVal - totalFixedCosts) >= 0 ? 'text-purple-600' : 'text-red-500'}`}>{formatMoney(marginVal - totalFixedCosts)}</h3>
                                            </div>
                                        </div>

                                        {/* Cruzamento DRE x Diagnóstico de Margens */}
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                            <div className="glass-card p-4 rounded-xl space-y-3">
                                                <h3 className="font-black text-slate-800 border-b pb-1.5 flex items-center gap-1.5"><Icon name="file-text" size={14}/> Tabela de Batimento Real de Metas</h3>
                                                <div className="overflow-x-auto no-scrollbar">
                                                    <table className="w-full text-left text-[11px] font-bold border-collapse border border-slate-200">
                                                        <thead>
                                                            <tr className="bg-slate-900 text-white text-[9px] uppercase">
                                                                <th className="p-2 border border-slate-700">Demonstrativo Estrutural</th>
                                                                <th className="p-2 text-right border border-slate-700">Valor Realizado</th>
                                                                <th className="p-2 text-center border border-slate-700">% Ref.</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y text-slate-700">
                                                            <tr className="bg-slate-100 font-black"><td colSpan="3" className="p-2 border">1. Faturamento Total Operacional</td></tr>
                                                            <tr><td className="p-2 pl-4 border">Vendas em Canais Digitais & Pix</td><td className="p-2 text-right border">{formatMoney(mPix + mPixOn)}</td><td className="p-2 text-center border">{faturamentoTotal > 0 ? (((mPix + mPixOn)/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                            <tr><td className="p-2 pl-4 border">Vendas Físicas em Dinheiro</td><td className="p-2 text-right border">{formatMoney(mDinheiro)}</td><td className="p-2 text-center border">{faturamentoTotal > 0 ? ((mDinheiro/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                            <tr><td className="p-2 pl-4 border">Vendas em Cartão Débito / Crédito</td><td className="p-2 text-right border">{formatMoney(mDebito + mCredito)}</td><td className="p-2 text-center border">{faturamentoTotal > 0 ? (((mDebito + mCredito)/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                            <tr><td className="p-2 pl-4 border">Delivery Apps (iFood)</td><td className="p-2 text-right border">{formatMoney(mIfood)}</td><td className="p-2 text-center border">{faturamentoTotal > 0 ? ((mIfood/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                            <tr><td className="p-2 pl-4 border">Vouchers, Tickets & Outros</td><td className="p-2 text-right border">{formatMoney(mFiado + mVR + mTicket + mAlelo)}</td><td className="p-2 text-center border">{faturamentoTotal > 0 ? (((mFiado + mVR + mTicket + mAlelo)/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                            <tr className="bg-blue-50/50 font-black"><td className="p-2 border">TOTAL RECEITA BRUTA (A)</td><td className="p-2 text-right border text-blue-700">{formatMoney(faturamentoTotal)}</td><td className="p-2 text-center border">100.0%</td></tr>
                                                            
                                                            <tr className="bg-slate-100 font-black"><td colSpan="3" className="p-2 border">2. Custos Variáveis Retidos</td></tr>
                                                            <tr className={cmvRealFinanceiroPercent > 35 ? "bg-red-50/30" : ""}><td className="p-2 pl-4 border text-slate-900 font-black">Custo Real de Mercadoria (Insumos Financeiro)</td><td className="p-2 text-right border text-red-600 font-black">-{formatMoney(custoInsumos)}</td><td className="p-2 text-center border text-red-600 font-black">{cmvRealFinanceiroPercent.toFixed(1)}%</td></tr>
                                                            <tr><td className="p-2 pl-4 border">Impostos Simples ({cmvSettings.tax}%)</td><td className="p-2 text-right border">-{formatMoney(impostosEstimados)}</td><td className="p-2 text-center border">{faturamentoTotal > 0 ? ((impostosEstimados/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                            <tr><td className="p-2 pl-4 border">Taxas de Operação Maquininhas</td><td className="p-2 text-right border">-{formatMoney(taxasCartaoTotais)}</td><td className="p-2 text-center border">{faturamentoTotal > 0 ? ((taxasCartaoTotais/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                            <tr><td className="p-2 pl-4 border">Custos de Entrega / Motoboy</td><td className="p-2 text-right border">-{formatMoney(totalMotoboy)}</td><td className="p-2 text-center border">{faturamentoTotal > 0 ? ((totalMotoboy/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                            <tr className="bg-red-50/20 font-black"><td className="p-2 border">TOTAL DE CUSTOS VARIÁVEIS (B)</td><td className="p-2 text-right border text-red-600">-{formatMoney(totalCustosVariaveis)}</td><td className="p-2 text-center border">{faturamentoTotal > 0 ? ((totalCustosVariaveis/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                            
                                                            <tr className="bg-amber-50/30 font-black"><td className="p-2 border">(=) MARGEM DE CONTRIBUIÇÃO LIQUIDA (A - B)</td><td className="p-2 text-right border text-amber-700">{formatMoney(marginVal)}</td><td className="p-2 text-center border text-amber-700">{faturamentoTotal > 0 ? ((marginVal/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                            
                                                            <tr className="bg-slate-100 font-black"><td colSpan="3" className="p-2 border">3. Estrutura de Custos Fixos</td></tr>
                                                            {listaCustosFixos.sort((a,b)=>b.val-a.val).map((fc, idx) => (
                                                                <tr key={idx}><td className="p-2 pl-4 border uppercase">{fc.desc}</td><td className="p-2 text-right border text-red-400">-{formatMoney(fc.val)}</td><td className="p-2 text-center border">{faturamentoTotal > 0 ? ((fc.val/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                            ))}
                                                            
                                                            <tr className="bg-slate-900 text-white font-black"><td className="p-2 border">(=) RESULTADO NET REAL DA TRIBAL (A - B - C)</td><td className="p-2 text-right border text-[#F8CC82]">{formatMoney(marginVal - totalFixedCosts)}</td><td className="p-2 text-center border text-[#F8CC82]">{faturamentoTotal > 0 ? (((marginVal - totalFixedCosts)/faturamentoTotal)*100).toFixed(1) : 0}%</td></tr>
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>

                                            <div className="glass-card p-4 rounded-xl space-y-3">
                                                <h3 className="font-black text-slate-800 border-b pb-1.5 flex items-center gap-1.5"><Icon name="pie-chart" size={14}/> Top 6 Produtos Críticos (CMV Teórico Acima da Meta)</h3>
                                                <div className="overflow-x-auto no-scrollbar">
                                                    <table className="w-full text-left">
                                                        <thead>
                                                            <tr className="bg-slate-50 text-[8px] text-slate-400 font-black"><th className="p-2">Item do Cardápio</th><th className="p-2 text-right">Custo Insumo</th><th className="p-2 text-right">Venda Real</th><th className="p-2 text-center">CMV Teórico</th></tr>
                                                        </thead>
                                                        <tbody className="divide-y text-[9px] font-bold">
                                                            {[...recipes.map(r=>({...r, _t:'Ficha'})), ...complements.map(c=>({...c, _t:'Extra'})), ...combos.map(c=>({...c, _t:'Combo'}))]
                                                                .map(item => {
                                                                    const cost = item.ingredients ? calcItemCost(item.ingredients) : calcComboCost(item.items); const sp = p(item.sellingPrice);
                                                                    return { ...item, cost, sp, cmv: sp > 0 ? (cost/sp)*100 : 0 };
                                                                })
                                                                .sort((a,b) => b.cmv - a.cmv)
                                                                .slice(0, 6)
                                                                .map(item => (
                                                                    <tr key={item.id} className="hover:bg-slate-50">
                                                                        <td className="p-2 truncate max-w-[140px]">{item.name} <span className="text-[7px] bg-slate-100 text-slate-400 px-1 rounded">{item._t}</span></td>
                                                                        <td className="p-2 text-right text-slate-400">{formatMoney(item.cost)}</td>
                                                                        <td className="p-2 text-right text-slate-900">{formatMoney(item.sp)}</td>
                                                                        <td className={`p-2 text-center ${item.cmv > cmvSettings.targetCMV ? 'text-red-500 font-black' : 'text-emerald-600'}`}>{item.cmv.toFixed(1)}%</td>
                                                                    </tr>
                                                                ))
                                                            }
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })()}

                            {/* DASHBOARD FINANCEIRO PRINCIPAL */}
                            {activeTab === 'fin_dashboard' && (
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 fade-in">
                                    <form onSubmit={handleSaveTx} className="lg:col-span-1 glass-card p-4 rounded-xl space-y-3 border-t-4 border-black h-fit relative">
                                        {txForm.id && <div className="absolute -top-3 right-4 bg-blue-600 text-white font-black px-2 py-0.5 rounded uppercase">A Editar</div>}
                                        <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
                                            {['entrada','saida','transferencia'].map(t => (
                                                <button key={t} type="button" onClick={() => setTxForm({...txForm, type: t, feeType:'none', feePercent:0})} className={`flex-1 py-1.5 rounded text-[9px] font-black uppercase ${txForm.type===t ? 'bg-white shadow text-black' : 'text-slate-400'}`}>{t}</button>
                                            ))}
                                        </div>
                                        <input type="text" list="desc-history" placeholder="Descrição" required className="w-full p-2 bg-slate-50 border rounded-lg font-bold outline-none" value={txForm.desc} onChange={e=>setTxForm({...txForm, desc: e.target.value})} />
                                        <datalist id="desc-history">{uniqueDescriptions.map((desc, idx) => <option key={idx} value={desc} />)}</datalist>
                                        <div className="grid grid-cols-3 gap-2">
                                            <div><label className="text-slate-400 block font-bold mb-0.5">Valor</label><input type="text" placeholder="0,00" required className="w-full p-2 bg-slate-50 border rounded-lg font-black outline-none" value={txForm.val} onChange={e=>setTxForm({...txForm, val: e.target.value})} /></div>
                                            <div><label className="text-slate-400 block font-bold mb-0.5">Parcelas</label><input type="number" min="1" className="w-full p-2 bg-slate-50 border rounded-lg font-black outline-none" value={txForm.inst} onChange={e=>setTxForm({...txForm, inst: e.target.value})} disabled={txForm.type==='transferencia'} /></div>
                                            <div><label className="text-slate-400 block font-bold mb-0.5">Conta</label><select className="w-full p-2 bg-white border rounded-lg font-black outline-none" value={txForm.acc} onChange={e=>setTxForm({...txForm, acc: e.target.value})}><option value="">Escolha...</option>{accounts.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}</select></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            {txForm.type === 'transferencia' ? (
                                                <div><label className="text-[#D97757] block font-bold mb-0.5">Destino</label><select className="w-full p-2 bg-white border border-[#D97757] rounded-lg font-black outline-none" value={txForm.destAcc} onChange={e=>setTxForm({...txForm, destAcc: e.target.value})}><option value="">Escolha...</option>{accounts.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}</select></div>
                                            ) : (
                                                <div><label className="text-slate-400 block font-bold mb-0.5">Categoria</label><select className="w-full p-2 bg-white border rounded-lg font-black outline-none" value={txForm.cat} onChange={e=>setTxForm({...txForm, cat: e.target.value})}><option value="">Escolha...</option>{categories.sort((a,b)=>a.name.localeCompare(b.name)).map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</select></div>
                                            )}
                                            <div><label className="text-slate-400 block font-bold mb-0.5">Fornecedor</label><select className="w-full p-2 bg-white border rounded-lg font-black outline-none" value={txForm.sup} onChange={e=>setTxForm({...txForm, sup: e.target.value})} disabled={txForm.type==='transferencia'}><option value="">Escolha...</option>{suppliers.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}</select></div>
                                        </div>
                                        {txForm.type === 'entrada' && (
                                            <div className="bg-emerald-50 border border-emerald-200 p-2 rounded-lg text-[9px]">
                                                <label className="font-black text-emerald-800 flex items-center gap-1 mb-1">Auto Taxar Lançamento?</label>
                                                <div className="flex gap-1.5">
                                                    <button type="button" onClick={() => setTxForm({...txForm, feeType: 'none', feePercent: 0})} className={`flex-1 py-1 rounded text-[8px] font-black ${txForm.feeType === 'none' ? 'bg-emerald-600 text-white' : 'bg-white border'}`}>Não</button>
                                                    <button type="button" onClick={() => setTxForm({...txForm, feeType: 'debito', feePercent: cmvSettings.taxaDebito})} className={`flex-1 py-1 rounded text-[8px] font-black ${txForm.feeType === 'debito' ? 'bg-emerald-600 text-white' : 'bg-white border'}`}>Débito</button>
                                                    <button type="button" onClick={() => setTxForm({...txForm, feeType: 'credito', feePercent: cmvSettings.taxaCredito})} className={`flex-1 py-1 rounded text-[8px] font-black ${txForm.feeType === 'credito' ? 'bg-emerald-600 text-white' : 'bg-white border'}`}>Crédito</button>
                                                    <button type="button" onClick={() => setTxForm({...txForm, feeType: 'custom', feePercent: ''})} className={`flex-1 py-1 rounded text-[8px] font-black ${txForm.feeType === 'custom' ? 'bg-emerald-600 text-white' : 'bg-white border'}`}>Outro</button>
                                                </div>
                                                {txForm.feeType === 'custom' && (
                                                    <div className="mt-2 flex items-center gap-2">
                                                        <span className="text-[9px] font-black text-emerald-800 uppercase">Qual a porcentagem (%)?</span>
                                                        <input type="number" step="0.01" className="p-1.5 border border-emerald-200 rounded text-[10px] font-bold w-16 outline-none text-center" value={txForm.feePercent} onChange={e => setTxForm({...txForm, feePercent: e.target.value})} placeholder="%" />
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="text-slate-400 block font-bold mb-0.5">Data Lanç.</label><input type="date" className="w-full p-1.5 border rounded-lg font-bold" value={txForm.date} onChange={e=>setTxForm({...txForm, date: e.target.value})} /></div>
                                            <div><label className="text-slate-400 block font-bold mb-0.5">Vencimento</label><input type="date" className="w-full p-1.5 border rounded-lg font-bold" value={txForm.clearance} onChange={e=>setTxForm({...txForm, clearance: e.target.value})} /></div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button type="button" onClick={()=>setTxForm({...txForm, status: 'pago'})} className={`flex-1 p-2 rounded-lg border font-black ${txForm.status==='pago'?'bg-green-500 text-white':'bg-white text-slate-400'}`}>PAGO</button>
                                            <button type="button" onClick={()=>setTxForm({...txForm, status: 'pendente'})} className={`flex-1 p-2 rounded-lg border font-black ${txForm.status==='pendente'?'bg-orange-500 text-white':'bg-white text-slate-400'}`}>PENDENTE</button>
                                        </div>
                                        <button className="w-full bg-black text-[#F8CC82] p-2.5 rounded-lg font-black uppercase text-[10px] mt-2">Gravar Movimentação</button>
                                    </form>

                                    <div className="lg:col-span-2 glass-card rounded-xl shadow-sm h-[550px] flex flex-col border overflow-hidden">
                                        <div className="p-3 bg-slate-50 border-b space-y-2">
                                            <div className="relative"><Icon name="search" size={14} className="absolute left-3 top-2.5 text-slate-300" /><input type="text" placeholder="Pesquisar histórico..." className="w-full pl-9 pr-3 py-2 bg-white border rounded-xl font-bold outline-none text-[10px]" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} /></div>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                                <select className="p-1.5 border rounded-lg font-black text-[9px]" value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}><option value="todos">TIPO: TODOS</option><option value="entrada">ENTRADAS</option><option value="saida">SAÍDAS</option><option value="transferencia">TRANSF.</option></select>
                                                <select className="p-1.5 border rounded-lg font-black text-[9px]" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}><option value="todos">STATUS: TODOS</option><option value="pago">PAGOS</option><option value="pendente">PENDENTES</option></select>
                                                <select className="p-1.5 border rounded-lg font-black text-[9px]" value={accFilter} onChange={e=>setAccFilter(e.target.value)}><option value="todas">CONTA: TODAS</option>{accounts.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}</select>
                                                <select className="p-1.5 border rounded-lg font-black text-[9px]" value={catFilter} onChange={e=>setCatFilter(e.target.value)}><option value="todas">CAT: TODAS</option>{categories.sort((a,b)=>a.name.localeCompare(b.name)).map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</select>
                                            </div>
                                        </div>
                                        <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                            {filteredDashboard.slice(0, visibleTxCount).map(t => (
                                                <div key={t.id} className="p-3 flex justify-between items-center hover:bg-slate-50 transition-all">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-6 h-6 rounded flex items-center justify-center font-black text-[9px] ${t.type === 'entrada' ? 'bg-green-100 text-green-700' : (t.type === 'transferencia' ? 'bg-blue-100 text-blue-700' : 'bg-red-50 text-red-600')}`}>
                                                            {t.type === 'entrada' ? 'IN' : (t.type === 'transferencia' ? 'TR' : 'OUT')}
                                                        </div>
                                                        <div>
                                                            <div className="flex items-center gap-2"><p className="font-black text-[11px] uppercase leading-none">{t.description}</p><span className={`status-badge ${t.status==='pago'?'bg-green-100 text-green-700':'bg-orange-100 text-orange-700'}`}>{t.status}</span></div>
                                                            <p className="font-bold text-slate-400 uppercase mt-1 text-[8px]">Lanç: {safeDateDisplay(t.date)} • Venc: {safeDateDisplay(t.clearanceDate)} • {t.account} • {t.category}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <p className="font-black text-slate-800">{formatMoney(t.amount)}</p>
                                                        <div className="flex gap-1 items-center">
                                                            <button type="button" onClick={()=>{setTxForm({id:t.id, desc:t.description||'', val:t.amount?.toString()||'', type:t.type, acc:t.account||'', destAcc:t.destinationAccount||'', cat:t.category||'', sup:t.supplier||'', date:t.date||'', clearance:t.clearanceDate||'', status:t.status, inst:1, feeType: 'none', feePercent: 0}); window.scrollTo({top:0, behavior:'smooth'});}} className="text-blue-500 font-black text-[8px] bg-slate-100 px-2 py-1.5 rounded hover:bg-blue-100">EDITAR</button>
                                                            <button type="button" onClick={() => executeDelete('transactions', t.id)} className={`transition-all px-2 py-1.5 font-black text-[8px] rounded ${deleteConfirmId === t.id ? 'delete-confirm' : 'bg-red-50 text-red-500 hover:bg-red-100'}`}>
                                                                {deleteConfirmId === t.id ? "SIM" : "EXCLUIR"}
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            {filteredDashboard.length > visibleTxCount && (
                                                <button type="button" onClick={() => setVisibleTxCount(prev => prev + 15)} className="w-full p-3 bg-slate-50 text-slate-500 font-black text-[9px] uppercase hover:bg-slate-100">Carregar Mais Histórico (+{filteredDashboard.length - visibleTxCount})</button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ABA: CONTAS E SALDOS */}
                            {activeTab === 'saldos' && (
                                <div className="space-y-4 fade-in">

                                                        {isCollapsed ? <Icon name="chevron-down" size={14} className="text-slate-400"/> : <Icon name="chevron-up" size={14} className="text-slate-400"/>}
                                                    </div>
                                                    {!isCollapsed && (
                                                        <div className="glass-card rounded-xl overflow-hidden border shadow-sm"><table className="w-full text-left text-[11px]">
                                                            <thead className="bg-slate-100 font-black text-slate-500 uppercase tracking-widest border-b"><tr><th className="p-3">Ingrediente</th><th className="p-3">Preço Base Compras</th><th className="p-3">Custo Grama/Unidade</th><th className="p-3 text-right">Ação</th></tr></thead>
                                                            <tbody className="divide-y font-bold text-slate-700">
                                                                {catIngs.sort((a,b)=>a.name.localeCompare(b.name)).map(ing => (
                                                                    <tr key={ing.id} className="hover:bg-slate-50">

                                                                        <td className="p-3 text-right"><div className="flex justify-end gap-1"><button type="button" onClick={()=>{setIngForm({...ing}); setIsIngModalOpen(true);}} className="text-blue-500 bg-slate-100 px-2 py-1 rounded text-[8px] font-black uppercase">Editar</button><button type="button" onClick={() => executeDelete('cmv_data/state', ing.id)} className="text-red-500 bg-red-50 px-2 py-1 rounded text-[8px] font-black uppercase">Excluir</button></div></td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table></div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* ABA: FICHAS TÉCNICAS */}
                            {activeTab === 'fichas' && (
                                <div className="space-y-4 fade-in">
                                    <div className="flex justify-between items-center bg-white p-4 rounded-xl border shadow-sm">
                                        <div><h2 className="font-black text-slate-800 text-sm uppercase">Fichas Técnicas Operacionais</h2><p className="text-[9px] font-bold text-slate-400 uppercase mt-0.5">{recipes.length} produtos mapeados com custos precisos</p></div>
                                        <button type="button" onClick={() => {setRecipeForm({ id: '', name: '', category: recCats[0], sellingPrice: '', ingredients: [], ignoreCMV: false }); setIsRecipeModalOpen(true);}} className="btn-accent px-4 py-2 rounded-lg font-black text-[9px] uppercase flex items-center gap-1"><Icon name="plus" size={12}/> Criar Ficha</button>
                                    </div>
                                    <div className="space-y-6">
                                        {recCats.map(cat => {
                                            const catRecs = recipes.filter(r => (r.category || 'Outros') === cat); if (catRecs.length === 0) return null;
                                            const isCollapsed = recipeCollapsed[cat];
                                            return (
                                                <div key={cat} className="space-y-3">
                                                    <div className="flex justify-between items-center border-b pb-1 cursor-pointer select-none" onClick={() => setRecipeCollapsed(prev => ({ ...prev, [cat]: !prev[cat] }))}>

                                                        {isCollapsed ? <Icon name="chevron-down" size={14} className="text-slate-400"/> : <Icon name="chevron-up" size={14} className="text-slate-400"/>}
                                                    </div>
                                                    {!isCollapsed && (
                                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                            {catRecs.sort((a,b)=>a.name.localeCompare(b.name)).map(rec => {

                                                                    <div key={rec.id} className={"glass-card rounded-xl p-4 shadow-sm border-t-4 " + (rec.ignoreCMV ? "border-slate-300 opacity-70" : "border-[#1A202C]")}>

                                                                            <div className={"p-1.5 rounded border " + (cmv > cmvSettings.targetCMV ? "bg-red-50 text-red-600" : "bg-green-50 text-green-700")}><span>CMV Real</span><span className="block font-black">{cmv.toFixed(1)}%</span></div>
                                                                        </div>
                                                                        <div className="flex justify-between items-center pt-2 border-t font-black"><span className="text-slate-400">Preço Venda:</span><span className="text-slate-900 text-sm">{formatMoney(sp)}</span></div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                                                <div key={cat} className="space-y-2">
                                                    <div className="flex justify-between items-center border-b pb-1 cursor-pointer select-none" onClick={() => setCompCollapsed(prev => ({ ...prev, [cat]: !prev[cat] }))}>

                                                                    <div className="flex gap-2 mt-3"><button type="button" onClick={()=>{setCompForm({...comp}); setIsCompModalOpen(true);}} className="flex-1 bg-slate-100 py-1 rounded font-black text-blue-600 text-[9px]">Editar</button><button type="button" onClick={()=>delActionCMV('complements', complements, comp.id)} className="flex-1 bg-red-50 py-1 rounded font-black text-red-500 text-[9px]">Excluir</button></div>

                                                                            <div className="bg-slate-50 p-1.5 rounded border"><span>Custo Combo</span><span className="block text-slate-800 font-black">{formatMoney(cost)}</span></div>
                                                                            <div className={"p-1.5 rounded border " + (cmv > cmvSettings.targetCMV ? "bg-red-50 text-red-600" : "bg-green-50 text-green-700")}><span>CMV Real</span><span className="block font-black">{cmv.toFixed(1)}%</span></div>
                                                                        </div>
                                                                        <div className="flex justify-between items-center pt-2 border-t font-black"><span className="text-slate-400">Preço Combo Venda:</span><span className="text-slate-900 text-sm">{formatMoney(sp)}</span></div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* ABA: ANÁLISE OPERACIONAL DE CARDÁPIO */}
                            {activeTab === 'analise' && (() => {
                                const totalFixedCosts = fixedCosts.reduce((s,c)=>s+p(c.value),0);
                                const cmvGeral = (() => { let sumCmv = 0, count = 0; [...recipes, ...complements, ...combos].forEach(item => { if (!item.ignoreCMV) { const cost = item.ingredients ? calcItemCost(item.ingredients) : calcComboCost(item.items); const sp = p(item.sellingPrice); if(sp>0){ sumCmv += (cost/sp)*100; count++; } } }); return count>0 ? (sumCmv/count).toFixed(1) : 0; })();
                                const margemContribuicao = 1 - (p(cmvGeral)/100) - ((p(cmvSettings.tax) + p(cmvSettings.apps) + p(cmvSettings.taxaCredito))/100);
                                const pontoEquilibrio = margemContribuicao > 0 ? totalFixedCosts / margemContribuicao : 0;
                                const faturamentoReal = stats.rb;
                                const faltaParaPe = pontoEquilibrio - faturamentoReal;

                                return (
                                    <div className="space-y-4 fade-in">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div className="glass-card p-4 rounded-xl border-l-4 border-blue-500 text-center"><span className="text-slate-400 block font-black text-[8px]">Faturamento Comercial Real</span><h3 className="text-xl font-black text-slate-800 mt-1">{formatMoney(stats.rb)}</h3></div>
                                            <div className="glass-card p-4 rounded-xl border-l-4 border-red-500 text-center"><span className="text-slate-400 block font-black text-[8px]">Custos Fixos Totais Cadastrados</span><h3 className="text-xl font-black text-red-500 mt-1">{formatMoney(totalFixedCosts)}</h3></div>

                                            <tbody className="divide-y text-slate-700">
                                                {[...recipes.map(r=>({...r, _t:'Ficha'})), ...complements.map(c=>({...c, _t:'Extra'})), ...combos.map(c=>({...c, _t:'Combo'}))].sort((a,b)=>a.name.localeCompare(b.name)).map(item => {
                                                    const cost = item.ingredients ? calcItemCost(item.ingredients) : calcComboCost(item.items); const sp = p(item.sellingPrice); const cmv = sp > 0 ? (cost/sp)*100 : 0;

                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table></div>
                                    </div>
                                );
                            })()}

                                 <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 fade-in">

                                         <form onSubmit={(e) => { e.preventDefault(); crudActionCMV('fixedCosts', fixedCosts, fcForm, setIsFcModalOpen); setFcForm({ id: '', description: '', category: fcCats[0], value: '' }); }} className="space-y-3">
                                             <input type="text" placeholder="Nome Custo Fixo (Ex: Aluguel)" required className="w-full p-2.5 bg-slate-50 border rounded-xl font-bold outline-none" value={fcForm.description} onChange={e=>setFcForm({...fcForm, description: e.target.value})} />
                                             <select className="w-full p-2.5 bg-slate-50 border rounded-xl font-bold outline-none" value={fcForm.category} onChange={e=>setFcForm({...fcForm, category: e.target.value})}>{fcCats.map(c=><option key={c} value={c}>{c}</option>)}</select>
                                             <input type="number" step="0.01" placeholder="Valor Mensal R$" required className="w-full p-2.5 bg-slate-50 border rounded-xl font-bold outline-none" value={fcForm.value} onChange={e=>setFcForm({...fcForm, value: e.target.value})} />
                                             <button className="w-full bg-black text-[#F8CC82] p-2.5 rounded-lg font-black uppercase text-[10px]">Gravar Custo Fixo</button>
                                         </form>
                                     </div>
                                     <div className="lg:col-span-2 glass-card rounded-xl overflow-hidden border shadow-sm">
                                         <table className="w-full text-left text-[11px] font-bold text-slate-700">
                                             <thead className="bg-slate-100 text-slate-500 uppercase tracking-widest border-b"><tr><th className="p-3">Descrição da Despesa</th><th className="p-3">Categoria Estrutural</th><th className="p-3 text-right">Valor Mensal</th><th className="p-3 text-right">Ações</th></tr></thead>
                                             <tbody className="divide-y">
                                                 {fixedCosts.map(fc => (
                                                     <tr key={fc.id} className="hover:bg-slate-50">
                                                         <td className="p-3 uppercase">{fc.description}</td>
                                                         <td className="p-3"><span className="bg-slate-100 px-2 py-0.5 rounded text-[8px] font-black">{fc.category}</span></td>
                                                         <td className="p-3 text-right text-red-500">{formatMoney(p(fc.value))}</td>
                                                         <td className="p-3 text-right"><button type="button" onClick={()=>delActionCMV('fixedCosts', fixedCosts, fc.id)} className="text-red-500 bg-red-50 px-2 py-1 rounded text-[8px] font-black uppercase">Excluir</button></td>
                                                     </tr>
                                                 ))}
                                             </tbody>
                                         </table>
                                     </div>
                                 </div>
                            )}

                            {/* ABA: CONFIGURAÇÕES E AJUSTES */}
                            {activeTab === 'ajustes' && (
                                 <div className="glass-card p-6 rounded-xl border-t-8 border-[#D97757] shadow-xl grid grid-cols-1 md:grid-cols-2 gap-6 fade-in">
                                     <div className="space-y-4"><div><h3 className="font-black uppercase text-slate-800 text-base">Parâmetros & Taxas Gerais</h3><p className="font-bold text-slate-400 uppercase mt-1">Configurações para os cálculos automáticos</p></div>
                                         <div className="grid grid-cols-2 gap-3">
                                             <div className="space-y-0.5"><label className="font-black text-slate-400">Meta CMV Geral (%)</label><input type="number" step="0.1" className="w-full p-2.5 bg-slate-50 border rounded-xl font-bold outline-none" value={cmvSettings.targetCMV} onChange={e=>setCmvSettings({...cmvSettings, targetCMV: e.target.value})} /></div>
                                             <div className="space-y-0.5"><label className="font-black text-slate-400">Impostos Simples (%)</label><input type="number" step="0.1" className="w-full p-2.5 bg-slate-50 border rounded-xl font-bold outline-none" value={cmvSettings.tax} onChange={e=>setCmvSettings({...cmvSettings, tax: e.target.value})} /></div>
                                             <div className="space-y-0.5"><label className="font-black text-slate-400">Taxa Máquina Débito (%)</label><input type="number" step="0.01" className="w-full p-2.5 bg-slate-50 border rounded-xl font-bold outline-none" value={cmvSettings.taxaDebito} onChange={e=>setCmvSettings({...cmvSettings, taxaDebito: e.target.value})} /></div>
                                             <div className="space-y-0.5"><label className="font-black text-slate-400">Taxa Máquina Crédito (%)</label><input type="number" step="0.01" className="w-full p-2.5 bg-slate-50 border rounded-xl font-bold outline-none" value={cmvSettings.taxaCredito} onChange={e=>setCmvSettings({...cmvSettings, taxaCredito: e.target.value})} /></div>
                                             <div className="space-y-0.5"><label className="font-black text-slate-400">Taxa Auto (Aba Vendas)</label>

                                                     <option value="sim">SIM (DEDUZIR DO DRE)</option><option value="nao">NÃO DEDUZIR</option>
                                                 </select>
                                             </div>
                                             <div className="space-y-0.5"><label className="font-black text-red-500">Taxa iFood (%)</label><input type="number" step="0.1" className="w-full p-2.5 bg-red-50/30 border border-red-100 rounded-xl font-bold text-red-600 outline-none focus:border-red-500" value={cmvSettings.ifoodTax} onChange={e=>setCmvSettings({...cmvSettings, ifoodTax: e.target.value})} /></div>
                                             <div className="col-span-2 space-y-0.5"><label className="font-black text-blue-500">Meta Vendas Mensal (R$)</label><input type="number" step="0.01" className="w-full p-2.5 bg-blue-50 border border-blue-100 rounded-xl font-bold outline-none focus:border-blue-500" value={metaVendas} onChange={e=>setMetaVendas(e.target.value)} /></div>
                                         </div>
                                         <button type="button" onClick={async()=>{ 
                                             if(window.confirm('Confirmar a alteração das Taxas e Parâmetros?')) {
                                                if(!user) return; 
                                                const settingsToSave = {
                                                    targetCMV: p(cmvSettings.targetCMV), 
                                                    tax: p(cmvSettings.tax), 
                                                    apps: p(cmvSettings.apps), 
                                                    taxaDebito: p(cmvSettings.taxaDebito), 
                                                    taxaCredito: p(cmvSettings.taxaCredito), 
                                                    ifoodTax: p(cmvSettings.ifoodTax), 
                                                    autoFeeVendas: cmvSettings.autoFeeVendas
                                                };
                                                await saveCMVDoc('settings', settingsToSave); 
                                                await saveMeta(metaVendas); 
                                                alert('Parâmetros Salvos com Sucesso!');
                                             }
                                         }} className="w-full bg-[#1A202C] text-[#F8CC82] p-2.5 rounded-lg font-black text-[10px] uppercase shadow">Salvar Configurações Globais</button>
                                     </div>
                                     <div className="space-y-4"><div><h3 className="font-black uppercase text-slate-800 text-base">Estrutura Financeira e Contas</h3><p className="font-bold text-slate-400 uppercase mt-1">Gerencie a lista oficial de contas operacionais</p></div>
                                         <div className="space-y-2">
                                             <form onSubmit={addCat} className="flex gap-2"><input type="text" placeholder="Nova Categoria..." className="flex-1 p-2 bg-slate-50 border rounded-lg font-bold outline-none" value={catForm} onChange={e=>setCatForm(e.target.value)} required /><button className="bg-black text-[#F8CC82] px-3 rounded-lg font-black text-[9px]">Add Cat.</button></form>
                                             
                                             <form onSubmit={handleSaveAcc} className="flex flex-col gap-2 bg-slate-50 p-3 rounded-xl border">
                                                 <div className="flex justify-between items-center mb-1">
                                                     <span className="font-black text-[9px] text-slate-600 uppercase">{accForm.id ? 'A Editar Conta/Cartão' : 'Nova Conta ou Cartão'}</span>
                                                     {accForm.id && <button type="button" onClick={()=>setAccForm({ id: null, name: '', type: 'corrente', group: 'operacional', limit: '', closing: '', due: '' })} className="text-[8px] text-red-500 font-black uppercase hover:underline">Cancelar Edição</button>}
                                                 </div>
                                                 <div className="flex gap-2">
                                                     <input type="text" placeholder="Nome Conta/Cartão" className="flex-1 p-2 bg-white border rounded-lg font-bold outline-none text-[10px]" value={accForm.name} onChange={e=>setAccForm({...accForm, name: e.target.value})} required />
                                                     <select className="p-2 bg-white border rounded-lg font-bold outline-none text-[10px]" value={accForm.type} onChange={e=>setAccForm({...accForm, type: e.target.value})}><option value="corrente">Corrente</option><option value="cartao">Cartão de Crédito</option></select>
                                                 </div>
                                                 {accForm.type === 'cartao' && (
                                                     <div className="grid grid-cols-3 gap-2">
                                                         <input type="number" placeholder="Limite R$" className="p-2 bg-white border rounded-lg font-bold text-[10px]" value={accForm.limit} onChange={e=>setAccForm({...accForm, limit: e.target.value})} />
                                                         <input type="number" placeholder="Dia Fecho" className="p-2 bg-white border rounded-lg font-bold text-[10px]" value={accForm.closing} onChange={e=>setAccForm({...accForm, closing: e.target.value})} />
                                                         <input type="number" placeholder="Dia Venc" className="p-2 bg-white border rounded-lg font-bold text-[10px]" value={accForm.due} onChange={e=>setAccForm({...accForm, due: e.target.value})} />
                                                     </div>
                                                 )}
                                                 <button className="w-full bg-[#1A202C] text-white py-2 rounded-lg font-black text-[10px] uppercase mt-1">{accForm.id ? 'Atualizar' : 'Salvar'} Conta/Cartão</button>
                                             </form>
                                         </div>
                                         <div className="mt-4 border-t pt-4">
                                             <h4 className="font-black text-slate-800 mb-3 flex items-center gap-1.5"><Icon name="wallet" size={12}/> Contas & Cartões Ativos</h4>
                                             <div className="space-y-1.5 overflow-y-auto max-h-[300px] no-scrollbar">
                                                 {accounts.length === 0 ? <p className="text-center font-bold text-slate-400 p-2">Vazio</p> : accounts.sort((a,b)=>a.name.localeCompare(b.name)).map(a => (
                                                     <div key={a.id} className="p-2.5 flex justify-between items-center bg-white border rounded-lg shadow-sm hover:border-slate-300 transition-all">
                                                         <div>
                                                             <div className="flex items-center gap-1.5">
                                                                 {a.type === 'cartao' ? <Icon name="credit-card" size={12} className="text-orange-500" /> : <Icon name="wallet" size={12} className="text-blue-500" />}
                                                                 <span className="font-black uppercase text-slate-800">{a.name}</span>
                                                             </div>
                                                             <p className="font-bold text-slate-400 uppercase mt-0.5 ml-4 text-[8px]">
                                                                 {a.type} {a.type === 'cartao' && ` • Limite: ${formatMoney(a.limit)} • Fecho: ${a.closing || a.closingDay || '25'} • Venc: ${a.due || a.dueDay || '10'}`}
                                                             </p>
                                                         </div>
                                                         <div className="flex gap-1 items-center">
                                                             <button type="button" onClick={()=>setAccForm({ ...a, closing: a.closing || a.closingDay || '', due: a.due || a.dueDay || '' })} className="text-blue-500 bg-slate-100 px-2 py-1 rounded text-[8px] font-black uppercase">Editar</button>
                                                             <button type="button" onClick={() => executeDelete('accounts', a.id)} className="text-red-500 bg-red-50 px-2 py-1 rounded text-[8px] font-black uppercase">Excluir</button>
                                                         </div>
                                                     </div>
                                                 ))}
                                             </div>
                                         </div>
                                     </div>
                                 </div>
                            )}

                        </div>
                    </main>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
