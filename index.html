                                                {/* BARRA DE FILTROS AVANÇADOS */}
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                                    <select className="p-2 border rounded-lg font-black text-[9px] outline-none" value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
                                                        <option value="todos">TIPO: TODOS</option><option value="entrada">ENTRADAS</option><option value="saida">SAÍDAS</option><option value="transferencia">TRANSF.</option>
                                                    </select>
                                                    <select className="p-2 border rounded-lg font-black text-[9px] outline-none" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
                                                        <option value="todos">STATUS: TODOS</option><option value="pago">PAGOS</option><option value="pendente">PENDENTES</option>
                                                    </select>
                                                    <select className="p-2 border rounded-lg font-black text-[9px] outline-none" value={accFilter} onChange={e=>setAccFilter(e.target.value)}>
                                                        <option value="todas">CONTA: TODAS</option>
                                                        {accounts.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}
                                                    </select>
                                                    <select className="p-2 border rounded-lg font-black text-[9px] outline-none" value={catFilter} onChange={e=>setCatFilter(e.target.value)}>
                                                        <option value="todas">CAT: TODAS</option>
                                                        {categories.sort((a,b)=>a.name.localeCompare(b.name)).map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                                {filteredDashboard.slice(0, visibleTxCount).map(t => (
                                                    <div key={t.id} className="p-3 flex justify-between items-center hover:bg-slate-50 transition-all">
                                                        <div className="flex items-center gap-3">
                                                            <div className={"w-6 h-6 rounded flex items-center justify-center font-black " + (t.type === 'transferencia' ? 'bg-blue-100 text-blue-700' : (t.type === 'entrada' ? 'bg-green-100 text-green-700' : 'bg-red-50 text-red-600'))}>{t.type === 'transferencia' ? 'TR' : (t.type === 'entrada' ? 'IN' : 'OUT')}</div>
                                                            <div>
                                                                <div className="flex items-center gap-2"><p className="font-black uppercase leading-none">{t.description}</p><span className={"status-badge " + (t.status==='pago'?'bg-green-100 text-green-700':'bg-orange-100 text-orange-700')}>{t.status==='pago' ? 'Pago' : 'Pendente'}</span></div>
                                                                <p className="font-bold text-slate-400 uppercase mt-1 text-[8px]">Lanç: {t.date ? t.date.split('-').reverse().join('/') : '--'} • Venc: {t.clearanceDate ? t.clearanceDate.split('-').reverse().join('/') : '--'} • {t.account} • {t.category}</p>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <p className={"font-black " + (t.type==='entrada'?'text-green-600':'text-slate-800')}>{formatMoney(t.amount)}</p>
                                                            <div className="flex gap-1">
                                                                <button onClick={()=>{setTxForm({id:t.id, desc:t.description||'', val:t.amount?.toString()||'', type:t.type, acc:t.account||'', destAcc:t.destinationAccount||'', cat:t.category||'', sup:t.supplier||'', date:t.date||'', clearance:t.clearanceDate||'', status:t.status, inst:1, feeType: 'none', feePercent: 0}); window.scrollTo({top:0, behavior:'smooth'});}} className="text-blue-400 p-1.5"><Icon name="edit-2" size={12}/></button>
                                                                <button onClick={() => executeDelete('transactions', t.id)} className={"transition-all p-1.5 rounded " + (deleteConfirmId === t.id ? 'delete-confirm' : 'text-red-400 hover:text-red-600')}>{deleteConfirmId === t.id ? <span className="font-black uppercase text-[8px]">Sim</span> : <Icon name="trash-2" size={12}/>}</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                                {filteredDashboard.length > visibleTxCount && (
                                                    <button onClick={() => setVisibleTxCount(prev => prev + 15)} className="w-full p-4 bg-slate-50 text-slate-500 font-black text-[9px] uppercase hover:bg-slate-100 transition-colors">
                                                        Carregar Mais (+{filteredDashboard.length - visibleTxCount} Ocultos)
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'saldos' && (() => {
                                    const highlightedNames = ['MERCADO PAGO', 'C6 BANK', 'IFOOD', 'CAIXA LOJA'];
                                    const fundKeywords = ['FUNDO', 'APLICAÇÃO', 'APLICACAO', 'INVESTIMENTO', 'RESERVA', 'POUPANÇA', 'POUPANCA'];
                                    
                                    const highlighted = currentAccounts.filter(a => highlightedNames.includes((a.name||'').trim().toUpperCase()));
                                    const funds = currentAccounts.filter(a => !highlightedNames.includes((a.name||'').trim().toUpperCase()) && fundKeywords.some(k => (a.name||'').toUpperCase().includes(k)));
                                    const others = currentAccounts.filter(a => !highlightedNames.includes((a.name||'').trim().toUpperCase()) && !fundKeywords.some(k => (a.name||'').toUpperCase().includes(k)));

                                    return (
                                        <div className="space-y-6 animate-in fade-in">
                                            <div className="stat-banner !border-black !bg-[#D97757] p-6 rounded-2xl"><p className="font-black uppercase tracking-[0.4em] opacity-80 mb-2">Patrimônio Líquido Disponível</p><h3 className="text-3xl font-black drop-shadow-xl">{formatMoney(totalPatrimony)}</h3></div>
                                            {highlighted.length > 0 && (
                                                <div className="space-y-3"><h2 className="font-black uppercase text-slate-800 border-b-2 pb-1.5 flex items-center gap-1.5"><Icon name="star" size={14} className="text-[#D97757]" /> Contas Principais</h2>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                                    {highlighted.map(acc => (<div key={acc.id} className="glass-card p-5 rounded-2xl shadow-md border-t-4 border-[#F27A18] text-center transform hover:scale-[1.02] transition-transform bg-orange-50/30"><p className="font-black text-slate-500 uppercase tracking-widest mb-1">{acc.name}</p><h3 className={"text-xl font-black " + (accountBalances[acc.name]>=0?'text-slate-900':'text-red-500')}>{formatMoney(accountBalances[acc.name]||0)}</h3></div>))}
                                                </div></div>
                                            )}
                                            {funds.length > 0 && (
                                                <div className="space-y-3"><h2 className="font-black uppercase text-slate-800 border-b-2 pb-1.5 flex items-center gap-1.5"><Icon name="trending-up" size={14} className="text-emerald-600" /> Fundos & Aplicações</h2>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                                    {funds.map(acc => (<div key={acc.id} className="glass-card p-5 rounded-2xl shadow-sm border-t-4 border-emerald-500 text-center bg-emerald-50/20"><p className="font-black text-slate-500 uppercase tracking-widest mb-1">{acc.name}</p><h3 className={"text-lg font-black " + (accountBalances[acc.name]>=0?'text-emerald-700':'text-red-500')}>{formatMoney(accountBalances[acc.name]||0)}</h3></div>))}
                                                </div></div>
                                            )}
                                            {others.length > 0 && (
                                                <div className="space-y-3"><h2 className="font-black uppercase text-slate-800 border-b-2 pb-1.5 flex items-center gap-1.5"><Icon name="wallet" size={14} className="text-slate-500" /> Outras Contas Operacionais</h2>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                                    {others.map(acc => (<div key={acc.id} className="glass-card p-4 rounded-xl shadow-sm border-t-4 border-[#1A202C] text-center"><p className="font-black text-slate-400 uppercase tracking-widest mb-1">{acc.name}</p><h3 className={"text-base font-black " + (accountBalances[acc.name]>=0?'text-slate-800':'text-red-500')}>{formatMoney(accountBalances[acc.name]||0)}</h3></div>))}
                                                </div></div>
                                            )}
                                        </div>
                                    );
                                })()}

                                {activeTab === 'vendas' && (() => {
                                    return (
                                        <div className="space-y-4 animate-in fade-in">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className="stat-banner !border-black !bg-[#D97757] p-5 rounded-2xl">
                                                    <p className="font-black uppercase tracking-[0.4em] opacity-80 mb-1">Faturamento Mês</p>
                                                    <h3 className="text-3xl font-black">{formatMoney(stats.rb)}</h3>
                                                </div>
                                                <div className="stat-banner !border-black !bg-slate-800 p-5 rounded-2xl">
                                                    <p className="font-black uppercase tracking-[0.4em] opacity-80 mb-1">Taxas Cartão (Auto)</p>
                                                    <h3 className="text-3xl font-black text-red-400">-{formatMoney(stats.autoCardFees || 0)}</h3>
                                                    {cmvSettings.autoFeeVendas !== false && <span className="text-[8px] bg-red-500/20 text-red-300 px-2 py-0.5 rounded mt-2 inline-block">DEDUZIDO NO DRE</span>}
                                                </div>
                                            </div>
                                            <div className="flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
                                                <div className="flex items-center gap-2"><Icon name="calendar-days" className="text-slate-400" /><h2 className="font-black uppercase tracking-widest">Caixa Diário</h2></div>
                                                <div className="flex items-center gap-2 bg-slate-50 p-1.5 rounded-xl border"><input type="date" className="font-bold bg-transparent outline-none border-0" value={newDayDate} onChange={e=>setNewDayDate(e.target.value)} /><button onClick={()=>db.collection(`artifacts/tribo-burger-financeiro/users/${user.uid}/dailyRecords`).doc(newDayDate).set({initialized:true},{merge:true})} className="bg-black text-[#F8CC82] px-3 py-1.5 rounded-lg font-black uppercase">Abrir</button></div>
                                            </div>
                                            <div className="glass-card rounded-2xl overflow-hidden border shadow-sm overflow-x-auto no-scrollbar">
                                                <table className="w-full text-center min-w-[1400px]">
                                                    <thead className="bg-[#1A202C] text-white uppercase tracking-widest border-b">
                                                        <tr>
                                                            <th className="p-2 sticky left-0 z-20 bg-[#1A202C]">Data</th><th className="p-2 bg-amber-500 text-black">Total Dia</th><th className="p-2 bg-blue-600 text-white">Pedidos</th><th className="p-2 bg-blue-800 text-white">Ticket</th>
                                                            {['Pix','Pix_On','Fiado','Dinh','Ifood','Débito
