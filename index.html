<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | ERP do Cantinho</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.21.0/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #D97757; color: #FFF; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-primary { background-color: #000; color: #F8CC82; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .btn-accent { background-color: #F27A18; color: #000; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .btn-accent:active { transform: scale(0.95); }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ node: containerRef.current, attrs: { width: size, height: size, class: className } });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('fin_dashboard');
            
            const [transactions, setTransactions] = useState([]);
            const [accounts, setAccounts] = useState([]);
            
            const [ingredients, setIngredients] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [cmvSettings, setCmvSettings] = useState({});
            const [ingredientCategories, setIngredientCategories] = useState(['Proteínas', 'Pães', 'Queijos', 'Molhos', 'Vegetais/Hortifrúti', 'Embalagens', 'Outros']);

            const [isIngModalOpen, setIsIngModalOpen] = useState(false);
            const [ingForm, setIngForm] = useState({ id: '', name: '', category: 'Outros', cost: '', unit: 'g', qty: '' });

            // Referência invisível para o input de arquivo
            const fileInputRef = useRef(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => { 
                    setUser(u); 
                    setLoading(false); 
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || user.isAnonymous) return;
                
                const pathFin = "artifacts/tribo-burger-financeiro/users/" + user.uid;
                const unsubTx = db.collection(pathFin + "/transactions").onSnapshot(s => setTransactions(s.docs.map(d => Object.assign({ id: d.id }, d.data()))));
                const unsubAcc = db.collection(pathFin + "/accounts").onSnapshot(s => setAccounts(s.docs.map(d => Object.assign({ id: d.id }, d.data()))));

                const pathCmv = "artifacts/tribo-burger-pricing-system/users/" + user.uid + "/user_data/state";
                const unsubCmv = db.doc(pathCmv).onSnapshot(s => {
                    if(s.exists) {
                        const data = s.data();
                        setIngredients(data.ingredients || []);
                        setRecipes(data.recipes || []);
                        setCmvSettings(data.settings || {});
                        if(data.ingredientCategories) setIngredientCategories(data.ingredientCategories);
                    }
                });

                return () => { unsubTx(); unsubAcc(); unsubCmv(); };
            }, [user]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            // ================= LÓGICA DE IMPORTAÇÃO DE ARQUIVO =================
            const handleFileImport = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        const pathCmv = "artifacts/tribo-burger-pricing-system/users/" + user.uid + "/user_data/state";
                        
                        await db.doc(pathCmv).set(data, { merge: true });
                        
                        alert("✅ Dados migrados com sucesso! O seu arquivo foi importado.");
                        window.location.reload();
                    } catch (err) {
                        alert("❌ Erro ao ler o arquivo. Certifique-se de que é o arquivo .json correto.");
                    }
                };
                reader.readAsText(file);
                // Reseta o input para permitir enviar o mesmo arquivo novamente se necessário
                event.target.value = null;
            };

            // ================= LÓGICA DE INSUMOS =================
            const handleSaveIngredient = async (e) => {
                e.preventDefault();
                if (!user) return;
                
                const targetId = ingForm.id || crypto.randomUUID();
                const list = [...ingredients];
                const index = list.findIndex(i => i.id === targetId);
                const record = { 
                    id: targetId, 
                    name: ingForm.name, 
                    category: ingForm.category, 
                    cost: parseFloat(ingForm.cost), 
                    unit: ingForm.unit, 
                    qty: parseFloat(ingForm.qty) 
                };

                if (index > -1) list[index] = record;
                else list.push(record);

                const pathCmv = "artifacts/tribo-burger-pricing-system/users/" + user.uid + "/user_data/state";
                await db.doc(pathCmv).set({ ingredients: list }, { merge: true });
                
                setIsIngModalOpen(false);
            };

            const handleDeleteIngredient = async (id) => {
                if(window.confirm("Excluir este insumo permanentemente?")) {
                    const list = ingredients.filter(i => i.id !== id);
                    const pathCmv = "artifacts/tribo-burger-pricing-system/users/" + user.uid + "/user_data/state";
                    await db.doc(pathCmv).set({ ingredients: list }, { merge: true });
                }
            };

            const openIngModal = (ing = null) => {
                if(ing) {
                    setIngForm({ id: ing.id, name: ing.name, category: ing.category, cost: ing.cost, unit: ing.unit, qty: ing.qty });
                } else {
                    setIngForm({ id: '', name: '', category: ingredientCategories[0] || 'Outros', cost: '', unit: 'g', qty: '' });
                }
                setIsIngModalOpen(true);
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C] text-[#F8CC82] font-black uppercase tracking-widest">Iniciando ERP Cantinho...</div>;

            if (!user || user.isAnonymous) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#1A202C] p-4">
                        <div className="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
                            <h2 className="text-xl font-black uppercase text-slate-800 mb-2">ERP Tribo Burger</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-6">Inicie sessão para acessar o sistema unificado</p>
                            <button onClick={async () => { const provider = new firebase.auth.GoogleAuthProvider(); await auth.signInWithPopup(provider); }} className="w-full bg-black text-[#F8CC82] p-4 rounded-xl font-black text-xs uppercase flex items-center justify-center gap-2">
                                <Icon name="lock" size={16}/> Entrar com Google
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 shadow-xl">
                        <div className="max-w-7xl mx-auto flex flex-col gap-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-[#F27A18] flex items-center justify-center font-black text-black text-lg">TB</div>
                                    <div>
                                        <h1 className="text-lg font-black text-[#F8CC82] uppercase leading-none">ERP do Cantinho</h1>
                                        <span className="text-[9px] font-black text-emerald-400 tracking-widest uppercase">Sistema Integrado Conectado</span>
                                    </div>
                                </div>
                                <button onClick={()=>auth.signOut()} className="text-[10px] font-black uppercase text-slate-400 hover:text-white">Sair</button>
                            </div>

                            <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                                <div className="flex gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/10 shrink-0">
                                    <span className="flex items-center px-3 text-[9px] font-black uppercase text-slate-400 border-r border-white/10"><Icon name="wallet" size={12} className="mr-1"/> Finanças</span>
                                    {['fin_dashboard', 'saldos', 'vendas', 'dre'].map(t => (
                                        <button key={t} onClick={()=>setActiveTab(t)} className={"px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all " + (activeTab === t ? "tab-active" : "text-slate-400 hover:text-white")}>
                                            {t.replace('fin_', '')}
                                        </button>
                                    ))}
                                </div>

                                <div className="flex gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/10 shrink-0">
                                    <span className="flex items-center px-3 text-[9px] font-black uppercase text-[#F27A18] border-r border-white/10"><Icon name="pie-chart" size={12} className="mr-1"/> Custos & CMV</span>
                                    {['cmv_dashboard', 'insumos', 'fichas', 'combos'].map(t => (
                                        <button key={t} onClick={()=>setActiveTab(t)} className={"px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all " + (activeTab === t ? "bg-[#F27A18] text-black rounded-xl shadow" : "text-slate-400 hover:text-white")}>
                                            {t.replace('cmv_', '')}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="p-4 max-w-7xl mx-auto w-full flex-1 space-y-6">
                        
                        {activeTab === 'fin_dashboard' && (
                            <div className="glass-card p-10 rounded-[3rem] text-center border-t-8 border-slate-800 fade-in shadow-xl">
                                <Icon name="trending-up" size={48} className="mx-auto mb-4 text-slate-300"/>
                                <h2 className="text-2xl font-black uppercase text-slate-800">Módulo Financeiro Integrado</h2>
                                <p className="text-xs font-bold text-slate-500 uppercase mt-2">Os seus lançamentos e caixas diários estão a carregar aqui.</p>
                                <p className="text-[10px] font-bold text-[#F27A18] uppercase mt-4">Transações ativas: {transactions.length}</p>
                            </div>
                        )}

                        {activeTab === 'insumos' && (
                            <div className="space-y-6 fade-in">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-6 rounded-[2rem] border shadow-sm">
                                    <div>
                                        <h2 className="text-sm font-black uppercase tracking-widest text-slate-800">Gestão de Insumos</h2>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">Matéria-prima cadastrada: {ingredients.length} itens</p>
                                    </div>
                                    <div className="flex gap-2 w-full md:w-auto">
                                        
                                        {/* Input invisível para upload de arquivo */}
                                        <input type="file" accept=".json" className="hidden" ref={fileInputRef} onChange={handleFileImport} />
                                        
                                        <button onClick={() => fileInputRef.current.click()} className="flex-1 md:flex-none bg-slate-100 hover:bg-slate-200 text-slate-600 px-6 py-3 rounded-xl flex items-center justify-center gap-2 text-[10px] font-black uppercase transition-all">
                                            <Icon name="upload" size={14}/> Importar Arquivo .JSON
                                        </button>
                                        <button onClick={() => openIngModal()} className="flex-1 md:flex-none btn-accent px-6 py-3 rounded-xl flex items-center justify-center gap-2 text-[10px]">
                                            <Icon name="plus" size={14}/> Novo Insumo
                                        </button>
                                    </div>
                                </div>

                                <div className="glass-card rounded-[2.5rem] overflow-hidden border shadow-sm overflow-x-auto">
                                    <table className="w-full text-left text-xs">
                                        <thead className="bg-slate-100 border-b text-[10px] font-black text-slate-500 uppercase tracking-widest">
                                            <tr>
                                                <th className="p-4">Ingrediente</th>
                                                <th className="p-4">Categoria</th>
                                                <th className="p-4">Preço (Embalagem)</th>
                                                <th className="p-4">Custo Unitário</th>
                                                <th className="p-4 text-right">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 font-semibold text-slate-700">
                                            {ingredients.length === 0 ? (
                                                <tr><td colSpan="5" className="p-12 text-center text-slate-400 uppercase font-black text-xs">Nenhum insumo cadastrado.<br/><span className="text-[9px] font-bold mt-2 inline-block">Use o botão "Importar Arquivo .JSON" para puxar os seus dados.</span></td></tr>
                                            ) : ingredients.sort((a,b)=>a.name.localeCompare(b.name)).map(ing => {
                                                const unitCost = ing.cost / ing.qty;
                                                return (
                                                    <tr key={ing.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-4 font-black uppercase text-slate-900">{ing.name}</td>
                                                        <td className="p-4"><span className="bg-slate-200 text-slate-700 px-2.5 py-1 rounded-lg text-[9px] uppercase font-black">{ing.category}</span></td>
                                                        <td className="p-4">{formatMoney(ing.cost)} <span className="text-[9px] text-slate-400">/ {ing.qty}{ing.unit}</span></td>
                                                        <td className="p-4 text-emerald-600 font-black">{formatMoney(unitCost)} <span className="text-[9px] text-slate-400">/ {ing.unit === 'kg' ? 'g' : (ing.unit === 'L' ? 'ml' : ing.unit)}</span></td>
                                                        <td className="p-4 text-right">
                                                            <button onClick={() => openIngModal(ing)} className="text-blue-500 hover:text-blue-700 p-2"><Icon name="edit-2" size={16}/></button>
                                                            <button onClick={() => handleDeleteIngredient(ing.id)} className="text-red-400 hover:text-red-600 p-2"><Icon name="trash-2" size={16}/></button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>

                                {isIngModalOpen && (
                                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                        <form onSubmit={handleSaveIngredient} className="bg-white w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl flex flex-col gap-4 scale-up-center">
                                            <h3 className="text-sm font-black uppercase text-slate-800 border-b pb-3 mb-2">{ingForm.id ? 'Editar Insumo' : 'Novo Insumo'}</h3>
                                            
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Nome do Insumo</label>
                                                <input type="text" required className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none focus:border-[#F27A18]" placeholder="Ex: Hambúrguer 150g" value={ingForm.name} onChange={e=>setIngForm({...ingForm, name: e.target.value})} />
                                            </div>

                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Categoria</label>
                                                <select className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none focus:border-[#F27A18]" value={ingForm.category} onChange={e=>setIngForm({...ingForm, category: e.target.value})}>
                                                    {ingredientCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                            </div>

                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Preço (R$)</label>
                                                    <input type="number" step="0.01" required className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none" value={ingForm.cost} onChange={e=>setIngForm({...ingForm, cost: e.target.value})} />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Unidade</label>
                                                    <select className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none" value={ingForm.unit} onChange={e=>setIngForm({...ingForm, unit: e.target.value})}>
                                                        <option value="kg">Quilo (kg)</option><option value="g">Grama (g)</option><option value="L">Litro (L)</option><option value="ml">Mililitro (ml)</option><option value="un">Unidade (un)</option>
                                                    </select>
                                                </div>
                                            </div>

                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Quantidade na Embalagem</label>
                                                <input type="number" step="0.001" required className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none" placeholder="Ex: 5" value={ingForm.qty} onChange={e=>setIngForm({...ingForm, qty: e.target.value})} />
                                            </div>

                                            <div className="flex gap-2 mt-4">
                                                <button type="submit" className="flex-1 btn-accent p-4 rounded-2xl text-[10px]">Salvar Insumo</button>
                                                <button type="button" onClick={()=>setIsIngModalOpen(false)} className="px-6 bg-slate-200 text-slate-600 font-black uppercase text-[10px] rounded-2xl">Cancelar</button>
                                            </div>
                                        </form>
                                    </div>
                                )}
                            </div>
                        )}

                        {['fichas', 'combos', 'saldos', 'vendas', 'dre'].includes(activeTab) && activeTab !== 'insumos' && activeTab !== 'fin_dashboard' && (
                            <div className="glass-card p-12 rounded-[3rem] text-center shadow-sm flex flex-col justify-center items-center gap-4">
                                <Icon name="sprout" size={40} className="text-emerald-400" />
                                <h2 className="text-xl font-black uppercase text-slate-800">Em Construção</h2>
                                <p className="text-xs font-bold text-slate-500 uppercase">A aba <strong>{activeTab.toUpperCase()}</strong> será implementada na Etapa 2.</p>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
