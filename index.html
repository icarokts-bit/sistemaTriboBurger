<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | ERP do Cantinho</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.21.0/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase Compat V10 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        body, input:not([type="password"]), select, button, textarea, option, span, p, h1, h2, h3, h4, th, td { text-transform: uppercase !important; }
        input::placeholder, textarea::placeholder { text-transform: uppercase !important; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #D97757; color: #FFF; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-primary { background-color: #000; color: #F8CC82; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .btn-accent { background-color: #F27A18; color: #000; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .btn-accent:active { transform: scale(0.95); }
        
        /* Estilos do Financeiro */
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        .stat-banner { background: #1A202C; border-bottom: 6px solid #D97757; color: white; padding: 2rem; border-radius: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .status-badge { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ node: containerRef.current, attrs: { width: size, height: size, class: className } });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('fin_dashboard');
            const fileInputRef = useRef(null);
            
            // ================= ESTADOS DO FINANCEIRO =================
            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [metaVendas, setMetaVendas] = useState(0);

            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [searchQuery, setSearchQuery] = useState('');
            const [typeFilter, setTypeFilter] = useState('todos');
            const [accFilter, setAccFilter] = useState('');
            const [catFilter, setCatFilter] = useState('');

            // Formulário de Lançamento Financeiro
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida');
            const [account, setAccount] = useState('');
            const [destAcc, setDestAcc] = useState('');
            const [cat, setCat] = useState('');
            const [sup, setSup] = useState('');
            const [status, setStatus] = useState('pago');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [clearance, setClearance] = useState(new Date().toISOString().split('T')[0]);
            const [editingId, setEditingId] = useState(null);
            const [newDayDate, setNewDayDate] = useState(new Date().toISOString().split('T')[0]);

            // ================= ESTADOS DO CMV =================
            const [ingredients, setIngredients] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [complements, setComplements] = useState([]);
            const [combos, setCombos] = useState([]);
            const [cmvSettings, setCmvSettings] = useState({ targetCMV: 30, tax: 6, apps: 0, card: 2.5, ifoodTax: 12 });
            
            const [ingredientCategories, setIngredientCategories] = useState(['Proteínas', 'Pães', 'Queijos', 'Molhos', 'Vegetais/Hortifrúti', 'Embalagens', 'Outros']);
            const [recipeCategories, setRecipeCategories] = useState(['Hambúrgueres', 'Acompanhamentos', 'Bebidas', 'Sobremesas', 'Molhos Caseiros', 'Outros', 'Smash']);
            const [complementCategories, setComplementCategories] = useState(['Extras', 'Molhos', 'Outros']);
            const [comboCategories, setComboCategories] = useState(['Promocionais', 'Família', 'Outros']);

            // Modais CMV
            const [isIngModalOpen, setIsIngModalOpen] = useState(false);
            const [ingForm, setIngForm] = useState({ id: '', name: '', category: 'Outros', cost: '', unit: 'g', qty: '' });
            const [ingCollapsed, setIngCollapsed] = useState({});

            const [isRecipeModalOpen, setIsRecipeModalOpen] = useState(false);
            const [recipeForm, setRecipeForm] = useState({ id: '', name: '', category: 'Hambúrgueres', sellingPrice: '', ingredients: [], ignoreCMV: false });
            const [recipeSearch, setRecipeSearch] = useState('');
            const [recipeCatFilter, setRecipeCatFilter] = useState('');
            const [recipeCollapsed, setRecipeCollapsed] = useState({});

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || user.isAnonymous) return;
                
                const pathFin = "artifacts/tribo-burger-financeiro/users/" + user.uid;
                
                // Listeners Financeiros
                const unsubTx = db.collection(pathFin + "/transactions").onSnapshot(s => setTransactions(s.docs.map(d => Object.assign({ id: d.id }, d.data()))));
                const unsubDaily = db.collection(pathFin + "/dailyRecords").onSnapshot(s => { const r = {}; s.docs.forEach(d => { if (d.exists) r[d.id] = d.data(); }); setDailyRecords(r); });
                const unsubAcc = db.collection(pathFin + "/accounts").onSnapshot(s => setAccounts(s.docs.map(d => Object.assign({ id: d.id }, d.data()))));
                const unsubCat = db.collection(pathFin + "/categories").onSnapshot(s => setCategories(s.docs.map(d => Object.assign({ id: d.id }, d.data()))));
                const unsubSup = db.collection(pathFin + "/suppliers").onSnapshot(s => setSuppliers(s.docs.map(d => Object.assign({ id: d.id }, d.data()))));
                const unsubMeta = db.doc(pathFin + "/settings/config").onSnapshot(s => { if(s.exists) setMetaVendas(s.data().meta || 0); });

                // Listeners CMV
                const pathCmv = pathFin + "/cmv_data/state";
                const unsubCmv = db.doc(pathCmv).onSnapshot(s => {
                    if(s.exists) {
                        const data = s.data();
                        setIngredients(data.ingredients || []);
                        setRecipes(data.recipes || []);
                        setComplements(data.complements || []);
                        setCombos(data.combos || []);
                        setCmvSettings(data.settings || { targetCMV: 30, tax: 6, apps: 0, card: 2.5, ifoodTax: 12 });
                        if(data.ingredientCategories) setIngredientCategories(data.ingredientCategories);
                        if(data.recipeCategories) setRecipeCategories(data.recipeCategories);
                        if(data.complementCategories) setComplementCategories(data.complementCategories);
                        if(data.comboCategories) setComboCategories(data.comboCategories);
                    }
                });

                return () => { unsubTx(); unsubDaily(); unsubAcc(); unsubCat(); unsubSup(); unsubMeta(); unsubCmv(); };
            }, [user]);

            const p = (v) => parseFloat(String(v || 0).replace(',', '.')) || 0;
            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            // ================= LÓGICA FINANCEIRA =================
            const uniqueDescriptions = useMemo(() => [...new Set(transactions.map(t => t.description).filter(Boolean))].sort(), [transactions]);
            const sortedCategoriesFin = useMemo(() => [...categories].sort((a, b) => (a.name || "").localeCompare(b.name || "")), [categories]);

            const filteredDashboard = useMemo(() => {
                return transactions.filter(t => {
                    if (!t) return false;
                    const isMonth = (t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth) || t.billingMonth === filterMonth);
                    const matchSearch = (t.description || "").toLowerCase().includes(searchQuery.toLowerCase()) || (t.category || "").toLowerCase().includes(searchQuery.toLowerCase());
                    const matchType = typeFilter === 'todos' || t.type === typeFilter;
                    const matchAcc = accFilter === '' || t.account === accFilter;
                    const matchCat = catFilter === '' || t.category === catFilter;
                    return isMonth && matchSearch && matchType && matchAcc && matchCat;
                }).sort((a,b) => (b.timestamp || "").localeCompare(a.timestamp || ""));
            }, [transactions, filterMonth, searchQuery, typeFilter, accFilter, catFilter]);

            const filteredSummary = useMemo(() => {
                let entradas = 0; let saidas = 0; let transfs = 0;
                filteredDashboard.forEach(t => {
                    const v = p(t.amount);
                    if (t.type === 'entrada') entradas += v;
                    else if (t.type === 'saida') saidas += v;
                    else if (t.type === 'transferencia') transfs += v;
                });
                return { entradas, saidas, transfs, saldo: entradas - saidas };
            }, [filteredDashboard]);

            const accountBalances = useMemo(() => {
                const bal = {}; 
                if (accounts) accounts.forEach(a => { if(a.name) bal[a.name] = 0; });
                transactions.forEach(t => {
                    if (t.status === 'pago') {
                        const amt = p(t.amount);
                        if (t.type === 'entrada') bal[t.account] = (bal[t.account] || 0) + amt;
                        else if (t.type === 'saida') bal[t.account] = (bal[t.account] || 0) - amt;
                        else if (t.type === 'transferencia') { 
                            bal[t.account] = (bal[t.account] || 0) - amt; 
                            bal[t.destinationAccount] = (bal[t.destinationAccount] || 0) + amt; 
                        }
                    }
                });
                return bal;
            }, [transactions, accounts]);

            const totalPatrimony = useMemo(() => accounts.filter(a => a.type === 'corrente').reduce((acc, a) => acc + (accountBalances[a.name] || 0), 0), [accounts, accountBalances]);

            const columnTotals = useMemo(() => {
                const days = Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth));
                const totals = { totalDia: 0, pedidos: 0, pix: 0, pixOnline: 0, fiado: 0, dinheiro: 0, ifood: 0, debito: 0, credito: 0, vr: 0, ticket: 0, alelo: 0, taxaEntrega: 0, motoboy: 0 };
                days.forEach(d => {
                    const r = dailyRecords[d] || {};
                    totals.totalDia += ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc,f)=>acc+p(r[f]), 0);
                    totals.pedidos += p(r.qtdPedidos);
                    ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].forEach(f => { totals[f] += p(r[f]); });
                    totals.taxaEntrega += p(r.taxaEntrega); totals.motoboy += p(r.motoboy);
                });
                totals.ticketMedio = totals.pedidos > 0 ? totals.totalDia / totals.pedidos : 0;
                return totals;
            }, [dailyRecords, filterMonth]);

            const stats = useMemo(() => {
                let rb = 0; let custos = 0; let catCosts = {}; let diasAtivos = 0; let entradas = 0; let contasPagas = 0;

                Object.keys(dailyRecords).forEach(d => {
                    const r = dailyRecords[d];
                    const totalDia = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((s,f)=>s+p(r[f]), 0);
                    if (d.startsWith(filterMonth)) {
                        if (totalDia > 0) diasAtivos++;
                        rb += totalDia;
                        custos += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });

                transactions.forEach(t => {
                    if (t.status === 'pago' && (t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth))) {
                        if (t.type === 'saida') {
                            catCosts[t.category] = (catCosts[t.category] || 0) + p(t.amount);
                            contasPagas += p(t.amount);
                        } else if (t.type === 'entrada') {
                            entradas += p(t.amount);
                        }
                    }
                });

                const operCosts = Object.values(catCosts).reduce((a,b)=>a+b, 0);
                const lucroDRE = rb - (operCosts + custos);
                const lucroCaixa = entradas - contasPagas;
                
                return { rb, totalCosts: operCosts + custos, lucro: lucroDRE, catCosts, diasAtivos, entradas, contasPagas, lucroCaixa, margemDRE: rb > 0 ? (lucroDRE / rb) * 100 : 0 };
            }, [dailyRecords, transactions, filterMonth]);

            const handleSaveTx = async (e) => {
                e.preventDefault();
                if (!user || !val) return;
                const path = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/transactions";
                const payload = { description: desc, amount: p(val), type, status, date, clearanceDate: clearance, billingMonth: date.slice(0, 7), account, destinationAccount: destAcc, category: type === 'transferencia' ? 'Transferência' : (cat || 'Geral'), supplier: sup, timestamp: new Date().toISOString() };
                if (editingId) await db.collection(path).doc(editingId).update(payload);
                else await db.collection(path).add(payload);
                setEditingId(null); setDesc(''); setVal(''); setType('saida'); setAccount(''); setDestAcc(''); setCat(''); setSup('');
            };

            const executeDeleteTx = async (id) => {
                if(window.confirm("Apagar transação?")) await db.collection('artifacts/tribo-burger-financeiro/users/' + user.uid + '/transactions').doc(id).delete();
            };

            const startEdit = (t) => { setEditingId(t.id); setDesc(t.description || ''); setVal(t.amount ? t.amount.toString() : ''); setType(t.type || 'saida'); setAccount(t.account || ''); setDestAcc(t.destinationAccount || ''); setCat(t.category || ''); setSup(t.supplier || ''); setDate(t.date || new Date().toISOString().split('T')[0]); setClearance(t.clearanceDate || new Date().toISOString().split('T')[0]); setStatus(t.status || 'pago'); window.scrollTo({ top: 0, behavior: 'smooth' }); };

            const handleOpenNewDay = async () => {
                if (!user) return;
                await db.collection('artifacts/tribo-burger-financeiro/users/' + user.uid + '/dailyRecords').doc(newDayDate).set({ initialized: true }, { merge: true });
            };

            const updateDaily = async (d, field, value) => {
                await db.collection('artifacts/tribo-burger-financeiro/users/' + user.uid + '/dailyRecords').doc(d).set({ [field]: value.replace(',','.') }, { merge: true });
            };

            // ================= LÓGICA CMV =================
            const getIngredientUnitCost = (ingId, qty) => {
                const ing = ingredients.find(i => i.id === ingId);
                if (!ing || !ing.cost || !ing.qty) return 0;
                const unitCost = ing.cost / ing.qty;
                let ratio = (ing.unit === 'kg' || ing.unit === 'L') ? 0.001 : 1;
                return unitCost * (parseFloat(qty || 0) * ratio);
            };

            const calculateItemCost = (itemIngredients) => {
                if (!itemIngredients || !Array.isArray(itemIngredients)) return 0;
                return itemIngredients.reduce((total, req) => total + getIngredientUnitCost(req.ingredientId, req.qty), 0);
            };

            // ================= RENDERIZAÇÃO =================
            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C] text-[#F8CC82] font-black uppercase tracking-widest">Iniciando ERP Cantinho...</div>;

            if (!user || user.isAnonymous) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#1A202C] p-4">
                        <div className="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
                            <h2 className="text-xl font-black uppercase text-slate-800 mb-2">ERP Tribo Burger</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-6">Inicie sessão para acessar o sistema unificado</p>
                            <button onClick={async () => { const provider = new firebase.auth.GoogleAuthProvider(); await auth.signInWithPopup(provider); }} className="w-full bg-black text-[#F8CC82] p-4 rounded-xl font-black text-xs uppercase flex items-center justify-center gap-2">
                                <Icon name="lock" size={16}/> Entrar com Google
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 shadow-xl">
                        <div className="max-w-7xl mx-auto flex flex-col gap-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-[#F27A18] flex items-center justify-center font-black text-black text-lg">TB</div>
                                    <div>
                                        <h1 className="text-lg font-black text-[#F8CC82] uppercase leading-none">ERP do Cantinho</h1>
                                        <span className="text-[9px] font-black text-emerald-400 tracking-widest uppercase">Sistema Integrado Conectado</span>
                                    </div>
                                </div>
                                <button onClick={()=>auth.signOut()} className="text-[10px] font-black uppercase text-slate-400 hover:text-white">Sair</button>
                            </div>

                            <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                                <div className="flex gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/10 shrink-0">
                                    <span className="flex items-center px-3 text-[9px] font-black uppercase text-slate-400 border-r border-white/10"><Icon name="wallet" size={12} className="mr-1"/> Finanças</span>
                                    {['fin_dashboard', 'saldos', 'vendas', 'dre'].map(t => (
                                        <button key={t} onClick={()=>setActiveTab(t)} className={"px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all " + (activeTab === t ? "tab-active" : "text-slate-400 hover:text-white")}>
                                            {t.replace('fin_', '')}
                                        </button>
                                    ))}
                                </div>

                                <div className="flex gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/10 shrink-0">
                                    <span className="flex items-center px-3 text-[9px] font-black uppercase text-[#F27A18] border-r border-white/10"><Icon name="pie-chart" size={12} className="mr-1"/> Custos & CMV</span>
                                    {['insumos', 'fichas'].map(t => (
                                        <button key={t} onClick={()=>setActiveTab(t)} className={"px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all " + (activeTab === t ? "bg-[#F27A18] text-black rounded-xl shadow" : "text-slate-400 hover:text-white")}>
                                            {t.replace('cmv_', '')}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="p-4 max-w-7xl mx-auto w-full flex-1 space-y-6">
                        
                        {/* ======================= FILTRO GLOBAL DE MÊS ======================= */}
                        {['fin_dashboard', 'vendas', 'dre'].includes(activeTab) && (
                            <div className="flex justify-center print:hidden fade-in">
                                <div className="glass-card px-6 py-2 rounded-full flex items-center gap-4 border shadow-sm">
                                    <span className="text-[9px] font-black uppercase text-slate-400">Mês Base:</span>
                                    <input type="month" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" />
                                </div>
                            </div>
                        )}

                        {/* ======================= ABA: DASHBOARD FINANCEIRO ======================= */}
                        {activeTab === 'fin_dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 fade-in">
                                <form onSubmit={handleSaveTx} className="lg:col-span-1 glass-card p-8 rounded-[3rem] shadow-sm space-y-4 border-t-4 border-black h-fit relative">
                                    {editingId && <div className="absolute -top-4 right-8 bg-blue-600 text-white text-[8px] font-black px-3 py-1 rounded-full uppercase">Editando Lançamento</div>}
                                    <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                                        {['entrada','saida','transferencia'].map(t=>(
                                            <button key={t} type="button" onClick={()=>setType(t)} className={"flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all " + (type===t ? 'bg-white shadow-sm text-black' : 'text-slate-400')}>{t}</button>
                                        ))}
                                    </div>
                                    <div className="relative">
                                        <input list="history-descriptions" type="text" placeholder="Descrição" required className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm outline-none focus:border-black" value={desc} onChange={e=>setDesc(e.target.value)} />
                                        <datalist id="history-descriptions">{uniqueDescriptions.map((d, i) => <option key={i} value={d} />)}</datalist>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[8px] font-black uppercase text-slate-400 ml-1">Valor Total</label>
                                            <input type="text" placeholder="0,00" required className="w-full p-3.5 bg-slate-50 border rounded-2xl font-black text-sm outline-none" value={val} onChange={e=>setVal(e.target.value)} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[8px] font-black uppercase text-slate-400 ml-1">Conta</label>
                                            <select className="w-full p-3.5 bg-white border rounded-2xl font-black text-[10px] outline-none" value={account} onChange={e=>setAccount(e.target.value)}>
                                                <option value="">Conta...</option>
                                                {accounts.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        {type === 'transferencia' ? (
                                            <div className="space-y-1">
                                                <label className="text-[8px] font-black uppercase text-[#D97757] ml-1">Conta Destino</label>
                                                <select className="w-full p-3.5 bg-white border border-[#D97757] rounded-2xl font-black text-[10px] outline-none focus:border-black" value={destAcc} onChange={e=>setDestAcc(e.target.value)} required>
                                                    <option value="">Destino...</option>
                                                    {accounts.filter(a => a.name !== account).map(a=><option key={a.id} value={a.name}>{a.name}</option>)}
                                                </select>
                                            </div>
                                        ) : (
                                            <div className="space-y-1">
                                                <label className="text-[8px] font-black uppercase text-slate-400 ml-1">Categoria</label>
                                                <select className="w-full p-3.5 bg-white border rounded-2xl font-black text-[10px] outline-none" value={cat} onChange={e=>setCat(e.target.value)}>
                                                    <option value="">Categoria...</option>
                                                    {sortedCategoriesFin.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                                                </select>
                                            </div>
                                        )}
                                        <div className="space-y-1">
                                            <label className="text-[8px] font-black uppercase text-slate-400 ml-1">Fornecedor</label>
                                            <select className="w-full p-3.5 bg-white border rounded-2xl font-black text-[10px] outline-none" value={sup} onChange={e=>setSup(e.target.value)} disabled={type === 'transferencia'}>
                                                <option value="">Fornecedor...</option>
                                                {suppliers.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Data Lanç.</label><input type="date" className="w-full p-3 border rounded-xl text-[10px] font-bold" value={date} onChange={e=>setDate(e.target.value)} /></div>
                                        <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Venc./Comp.</label><input type="date" className="w-full p-3 border rounded-xl text-[10px] font-bold" value={clearance} onChange={e=>setClearance(e.target.value)} /></div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button type="button" onClick={()=>setStatus('pago')} className={"flex-1 p-3 rounded-xl border font-black text-[10px] " + (status==='pago'?'bg-green-500 text-white':'bg-white text-slate-400')}>PAGO</button>
                                        <button type="button" onClick={()=>setStatus('pendente')} className={"flex-1 p-3 rounded-xl border font-black text-[10px] " + (status==='pendente'?'bg-orange-500 text-white':'bg-white text-slate-400')}>PENDENTE</button>
                                    </div>
                                    <button className="w-full bg-black text-[#F8CC82] p-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">{editingId ? 'Atualizar' : 'Gravar'}</button>
                                </form>

                                <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm h-[700px] flex flex-col border overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b space-y-4">
                                        <div className="flex flex-wrap justify-between items-center bg-white p-3 rounded-2xl border shadow-sm gap-2">
                                            <span className="text-[9px] font-black uppercase text-slate-400 flex items-center gap-1"><Icon name="search" size={12} /> Lançamentos do Mês ({filteredDashboard.length})</span>
                                            <div className="flex gap-3 text-[11px] font-black items-center">
                                                {typeFilter !== 'saida' && typeFilter !== 'transferencia' && filteredSummary.entradas > 0 && (<span className="text-green-600 px-2 py-1 bg-green-50 rounded-lg">IN: + {formatMoney(filteredSummary.entradas)}</span>)}
                                                {typeFilter !== 'entrada' && typeFilter !== 'transferencia' && filteredSummary.saidas > 0 && (<span className="text-red-500 px-2 py-1 bg-red-50 rounded-lg">OUT: - {formatMoney(filteredSummary.saidas)}</span>)}
                                                {typeFilter === 'todos' && (<span className={"px-3 py-1 rounded-lg " + (filteredSummary.saldo >= 0 ? "bg-blue-50 text-blue-600" : "bg-orange-50 text-orange-600")}>SALDO: {formatMoney(filteredSummary.saldo)}</span>)}
                                            </div>
                                        </div>

                                        <div className="relative"><Icon name="search" size={16} className="absolute left-4 top-3.5 text-slate-300" /><input type="text" placeholder="Pesquisar histórico..." className="w-full pl-12 pr-4 py-3 bg-white border rounded-2xl text-xs font-bold outline-none focus:border-black shadow-inner" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} /></div>
                                        <div className="flex flex-wrap gap-2 items-center">
                                            <select className="p-2 border rounded-xl text-[9px] font-black uppercase" value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
                                                <option value="todos">Todos os Fluxos</option>
                                                <option value="entrada">Entradas</option>
                                                <option value="saida">Saídas</option>
                                                <option value="transferencia">Transferências</option>
                                            </select>
                                            <select className="p-2 border rounded-xl text-[9px] font-black uppercase" value={accFilter} onChange={e=>setAccFilter(e.target.value)}>
                                                <option value="">Todas as Contas</option>
                                                {accounts.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {filteredDashboard.length === 0 ? (
                                            <div className="p-16 text-center text-slate-300 font-bold uppercase text-xs">Nenhum lançamento encontrado neste mês com estes filtros</div>
                                        ) : filteredDashboard.map(t => (
                                            <div key={t.id} className="p-4 flex justify-between items-center hover:bg-slate-50 transition-all group">
                                                <div className="flex items-center gap-4">
                                                    <div className={"w-8 h-8 rounded-lg flex items-center justify-center font-black text-[8px] " + (t.type === 'transferencia' ? 'bg-blue-100 text-blue-700' : (t.type === 'entrada' ? 'bg-green-100 text-green-700' : 'bg-red-50 text-red-600'))}>{t.type === 'transferencia' ? 'TR' : (t.type === 'entrada' ? 'IN' : 'OUT')}</div>
                                                    <div>
                                                        <div className="flex items-center gap-2">
                                                            <p className="font-black text-sm uppercase leading-none">{t.description}</p>
                                                            <span className={"status-badge " + (t.status==='pago'?'bg-green-100 text-green-700':'bg-orange-100 text-orange-700')}>{t.status==='pago' ? 'Pago' : 'Pendente'}</span>
                                                        </div>
                                                        <p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.type === 'transferencia' ? t.account + " ➔ " + t.destinationAccount : t.account + " • " + t.category}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <p className={"font-black text-sm " + (t.type==='entrada'?'text-green-600':'text-slate-800')}>{formatMoney(t.amount)}</p>
                                                    <div className="flex gap-1">
                                                        <button type="button" onClick={()=>startEdit(t)} className="text-blue-400 p-2"><Icon name="edit-2" size={14}/></button>
                                                        <button type="button" onClick={() => executeDeleteTx(t.id)} className="text-red-400 hover:text-red-600 p-2"><Icon name="trash-2" size={14}/></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ======================= ABA: SALDOS ======================= */}
                        {activeTab === 'saldos' && (
                            <div className="space-y-12 animate-in fade-in">
                                <div className="stat-banner !border-black !bg-[#D97757]">
                                    <p className="text-[11px] font-black uppercase tracking-[0.4em] opacity-80 mb-2">Patrimônio Líquido Disponível</p>
                                    <h3 className="text-5xl font-black drop-shadow-xl">{formatMoney(totalPatrimony)}</h3>
                                </div>
                                {['operacional','reserva','outros'].map(grp => {
                                    const grpAccs = accounts.filter(a => a.type === 'corrente' && (a.group === grp || (!a.group && grp === 'operacional'))).sort((a,b)=>parseInt(a.pos||0)-parseInt(b.pos||0));
                                    if (grpAccs.length === 0) return null;
                                    return (
                                        <div key={grp} className="space-y-4">
                                            <h2 className="text-[10px] font-black uppercase text-slate-400 border-l-4 border-slate-400 pl-3 ml-2">{grp}</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                                {grpAccs.map(acc => (
                                                    <div key={acc.id} className={"glass-card p-8 rounded-[3.5rem] shadow-xl border-t-8 border-[#1A202C] text-center transition-all"}>
                                                        <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">{acc.name}</p>
                                                        <h3 className={"text-3xl font-black " + (accountBalances[acc.name]>=0?'text-slate-900':'text-red-500')}>{formatMoney(accountBalances[acc.name]||0)}</h3>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* ======================= ABA: VENDAS DIÁRIAS ======================= */}
                        {activeTab === 'vendas' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="stat-banner !border-black !bg-[#D97757]">
                                    <p className="text-[11px] font-black uppercase tracking-[0.4em] opacity-80 mb-2">Faturamento Total do Mês</p>
                                    <h3 className="text-5xl font-black drop-shadow-xl">{formatMoney(stats.rb)}</h3>
                                </div>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-6 rounded-[2rem] border shadow-sm">
                                    <div className="flex items-center gap-3"><Icon name="calendar-days" className="text-slate-400" /><h2 className="text-[10px] font-black uppercase tracking-widest">Controle de Vendas Diárias</h2></div>
                                    <div className="flex items-center gap-3 bg-slate-50 p-2 rounded-2xl border">
                                        <div className="flex flex-col"><label className="text-[7px] font-black uppercase text-slate-400 ml-1">Data para Abrir</label><input type="date" className="text-xs font-bold bg-transparent outline-none border-0" value={newDayDate} onChange={e=>setNewDayDate(e.target.value)} /></div>
                                        <div className="w-px h-6 bg-slate-200"></div>
                                        <button type="button" onClick={handleOpenNewDay} className="bg-black text-[#F8CC82] px-4 py-2 rounded-xl text-[9px] font-black uppercase flex items-center gap-2 hover:bg-slate-800 transition-all"><Icon name="plus-circle" size={14}/> Abrir Novo Dia</button>
                                    </div>
                                </div>
                                <div className="glass-card rounded-[2.5rem] overflow-hidden border shadow-sm overflow-x-auto no-scrollbar">
                                    <table className="w-full text-center text-[11px] min-w-[1700px]">
                                        <thead>
                                            <tr className="header-black text-white">
                                                <th className="p-4 sticky left-0 z-20 bg-black">Data</th>
                                                <th className="p-4 bg-yellow-500 text-black">Total Dia</th>
                                                <th className="p-4 bg-blue-600 text-white">Pedidos</th>
                                                <th className="p-4 bg-blue-800 text-white">Ticket Médio</th>
                                                {['Pix','Pix Online','Fiado','Dinheiro','Ifood','Débito','Crédito','VR','Ticket','Alelo'].map(h=><th key={h} className="p-4">{h}</th>)}
                                                <th className="p-4 text-orange-400 bg-orange-50/20">Taxa Entrega</th>
                                                <th className="p-4 text-red-400 bg-red-50/20">Motoboy</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y font-bold">
                                            {Object.keys(dailyRecords).filter(d=>d.startsWith(filterMonth)).sort((a,b)=>new Date(b)-new Date(a)).map(d => {
                                                const r = dailyRecords[d] || {}; 
                                                const total = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc,f)=>acc+p(r[f]), 0); 
                                                const pedidos = p(r.qtdPedidos); 
                                                const ticketMedio = pedidos > 0 ? total / pedidos : 0;
                                                return (
                                                    <tr key={d} className="hover:bg-slate-50 h-12">
                                                        <td className="p-0 sticky left-0 bg-white border-r min-w-[120px] font-black">{d.split('-').reverse().join('/')}</td>
                                                        <td className="p-4 bg-yellow-50 font-black">{formatMoney(total)}</td>
                                                        <td className="p-0 border-r bg-blue-50/30"><input className="table-input !text-blue-700" value={r.qtdPedidos||''} onChange={(e)=>updateDaily(d, 'qtdPedidos', e.target.value)} placeholder="0" /></td>
                                                        <td className="p-4 bg-blue-50/50 font-black text-blue-900">{formatMoney(ticketMedio)}</td>
                                                        {['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].map(f => (
                                                            <td key={f} className="p-0 border-r"><input className="table-input" value={r[f]||''} onChange={(e)=>updateDaily(d, f, e.target.value)} placeholder="0,00" /></td>
                                                        ))}
                                                        <td className="p-0 border-r bg-slate-50/50"><input className="table-input !text-orange-500" value={r.taxaEntrega||''} onChange={(e)=>updateDaily(d, 'taxaEntrega', e.target.value)} placeholder="0,00" /></td>
                                                        <td className="p-0 border-r bg-slate-50/50"><input className="table-input !text-red-500" value={r.motoboy||''} onChange={(e)=>updateDaily(d, 'motoboy', e.target.value)} placeholder="0,00" /></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                        <tfoot>
                                            <tr className="bg-[#1A202C] text-white font-black uppercase text-[10px] border-t-4 border-[#D97757] h-12">
                                                <td className="p-0 sticky left-0 bg-[#1A202C] z-10 text-center font-black text-amber-300">SOMA TOTAL</td>
                                                <td className="p-4 bg-yellow-500 text-black font-black text-xs">{formatMoney(columnTotals.totalDia)}</td>
                                                <td className="p-4 bg-blue-600 text-white font-black text-xs">{columnTotals.pedidos}</td>
                                                <td className="p-4 bg-blue-800 text-[#F8CC82] font-black text-xs">{formatMoney(columnTotals.ticketMedio)}</td>
                                                {['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].map(f => ( <td key={f} className="p-4 border-r bg-slate-800 text-xs font-black">{formatMoney(columnTotals[f])}</td> ))}
                                                <td className="p-4 border-r text-orange-400 bg-orange-950/25 text-xs font-black">{formatMoney(columnTotals.taxaEntrega)}</td>
                                                <td className="p-4 border-r text-red-400 bg-red-950/25 text-xs font-black">{formatMoney(columnTotals.motoboy)}</td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* ======================= ABA: DRE ======================= */}
                        {activeTab === 'dre' && (
                            <div className="max-w-3xl mx-auto glass-card rounded-[3rem] p-10 shadow-2xl border-t-8 border-[#D97757] animate-in fade-in">
                                <h2 className="text-xl font-black uppercase mb-8 border-b pb-4 text-center">DRE Operacional - {filterMonth}</h2>
                                <div className="space-y-4">
                                    <div className="flex justify-between p-4 bg-green-50 rounded-2xl font-black text-[10px] uppercase"><span>(+) Receita Bruta</span><span>{formatMoney(stats.rb)}</span></div>
                                    <div className="py-4 border-b">
                                        <h3 className="text-[10px] font-black uppercase text-slate-400 mb-2 px-4">Despesas por Categoria</h3>
                                        {Object.entries(stats.catCosts).sort(([a],[b])=>a.localeCompare(b)).map(([c, v]) => (
                                            <div key={c} className="flex justify-between px-4 py-2 text-[10px] font-bold text-slate-600 uppercase"><span>(-) {c}</span><span className="text-red-400 font-black">{formatMoney(v)}</span></div>
                                        ))}
                                    </div>
                                    <div className={"flex justify-between items-center p-8 rounded-[2.5rem] mt-6 shadow-xl " + (stats.lucro>=0?'bg-[#1A202C] text-[#F8CC82]':'bg-red-600 text-white')}>
                                        <div>
                                            <h3 className="text-xl font-black uppercase">Resultado Líquido</h3>
                                            <p className="text-[9px] font-black uppercase opacity-70 mt-1">Margem Real: {stats.margemDRE.toFixed(1)}%</p>
                                        </div>
                                        <span className="text-4xl font-black">{formatMoney(stats.lucro)}</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ======================= ABAS EM CONSTRUÇÃO ======================= */}
                        {['insumos', 'fichas'].includes(activeTab) && (
                            <div className="glass-card p-12 rounded-[3rem] text-center shadow-sm flex flex-col justify-center items-center gap-4">
                                <Icon name="check-circle" size={40} className="text-emerald-400" />
                                <h2 className="text-xl font-black uppercase text-slate-800">Cardápio Configurado!</h2>
                                <p className="text-xs font-bold text-slate-500 uppercase">Aceda pelo menu superior.</p>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
