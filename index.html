<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | ERP do Cantinho</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.21.0/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase Compat V10 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #D97757; color: #FFF; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-primary { background-color: #000; color: #F8CC82; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .btn-accent { background-color: #F27A18; color: #000; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .btn-accent:active { transform: scale(0.95); }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ node: containerRef.current, attrs: { width: size, height: size, class: className } });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('fin_dashboard');
            
            const [transactions, setTransactions] = useState([]);
            const [accounts, setAccounts] = useState([]);
            
            // Dados CMV
            const [ingredients, setIngredients] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [complements, setComplements] = useState([]);
            const [combos, setCombos] = useState([]);
            const [cmvSettings, setCmvSettings] = useState({ targetCMV: 30, tax: 6, apps: 0, card: 2.5, ifoodTax: 12 });
            
            const [ingredientCategories, setIngredientCategories] = useState(['Proteínas', 'Pães', 'Queijos', 'Molhos', 'Vegetais/Hortifrúti', 'Embalagens', 'Outros']);
            const [recipeCategories, setRecipeCategories] = useState(['Hambúrgueres', 'Acompanhamentos', 'Bebidas', 'Sobremesas', 'Molhos Caseiros', 'Outros', 'Smash']);
            const [complementCategories, setComplementCategories] = useState(['Extras', 'Molhos', 'Outros']);
            const [comboCategories, setComboCategories] = useState(['Promocionais', 'Família', 'Outros']);

            // Estados - Insumos
            const [isIngModalOpen, setIsIngModalOpen] = useState(false);
            const [ingForm, setIngForm] = useState({ id: '', name: '', category: 'Outros', cost: '', unit: 'g', qty: '' });
            const [ingCollapsed, setIngCollapsed] = useState({});

            // Estados - Fichas Técnicas
            const [isRecipeModalOpen, setIsRecipeModalOpen] = useState(false);
            const [recipeForm, setRecipeForm] = useState({ id: '', name: '', category: 'Hambúrgueres', sellingPrice: '', ingredients: [], ignoreCMV: false });
            const [recipeSearch, setRecipeSearch] = useState('');
            const [recipeCatFilter, setRecipeCatFilter] = useState('');
            const [recipeCollapsed, setRecipeCollapsed] = useState({});

            // Estados - Complementos
            const [isCompModalOpen, setIsCompModalOpen] = useState(false);
            const [compForm, setCompForm] = useState({ id: '', name: '', category: 'Extras', sellingPrice: '', ingredients: [], ignoreCMV: false });
            const [compSearch, setCompSearch] = useState('');
            const [compCatFilter, setCompCatFilter] = useState('');
            const [compCollapsed, setCompCollapsed] = useState({});

            // Estados - Combos
            const [isComboModalOpen, setIsComboModalOpen] = useState(false);
            const [comboForm, setComboForm] = useState({ id: '', name: '', category: 'Promocionais', sellingPrice: '', items: [], ignoreCMV: false });
            const [comboSearch, setComboSearch] = useState('');
            const [comboCatFilter, setComboCatFilter] = useState('');
            const [comboCollapsed, setComboCollapsed] = useState({});

            const fileInputRef = useRef(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => { 
                    setUser(u); 
                    setLoading(false); 
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || user.isAnonymous) return;
                
                const pathFin = "artifacts/tribo-burger-financeiro/users/" + user.uid;
                const unsubTx = db.collection(pathFin + "/transactions").onSnapshot(s => setTransactions(s.docs.map(d => Object.assign({ id: d.id }, d.data()))));
                const unsubAcc = db.collection(pathFin + "/accounts").onSnapshot(s => setAccounts(s.docs.map(d => Object.assign({ id: d.id }, d.data()))));

                const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                const unsubCmv = db.doc(pathCmv).onSnapshot(s => {
                    if(s.exists) {
                        const data = s.data();
                        setIngredients(data.ingredients || []);
                        setRecipes(data.recipes || []);
                        setComplements(data.complements || []);
                        setCombos(data.combos || []);
                        setCmvSettings(data.settings || { targetCMV: 30, tax: 6, apps: 0, card: 2.5, ifoodTax: 12 });
                        
                        if(data.ingredientCategories) setIngredientCategories(data.ingredientCategories);
                        if(data.recipeCategories) setRecipeCategories(data.recipeCategories);
                        if(data.complementCategories) setComplementCategories(data.complementCategories);
                        if(data.comboCategories) setComboCategories(data.comboCategories);
                    }
                });

                return () => { unsubTx(); unsubAcc(); unsubCmv(); };
            }, [user]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            // ================= IMPORTAÇÃO DE DADOS =================
            const handlePasteImport = async () => {
                const text = prompt("Cole aqui todo o texto do backup que você copiou no sistema antigo:");
                if (!text || text.trim() === "") return;

                let data;
                try {
                    data = JSON.parse(text);
                    if (!data.ingredients && !data.recipes) {
                        alert("❌ Formato inválido! Certifique-se de que copiou o texto inteiro.");
                        return;
                    }
                } catch (err) {
                    alert("❌ Erro ao ler o texto copiado: " + err.message);
                    return;
                }

                try {
                    const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                    await db.doc(pathCmv).set(data, { merge: true });
                    alert("✅ Yess! Os dados do Cantinho foram colados e migrados com sucesso!");
                    window.location.reload();
                } catch (err) {
                    alert("❌ Erro no Firebase: " + err.message);
                }
            };

            const handleFileImport = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    let data;
                    try {
                        let text = e.target.result;
                        if (!text || text.trim() === '') throw new Error("O arquivo parece estar vazio.");
                        data = JSON.parse(text);
                    } catch (err) {
                        alert("❌ Erro ao interpretar o arquivo JSON.\nMotivo: " + err.message);
                        return;
                    }

                    try {
                        const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                        await db.doc(pathCmv).set(data, { merge: true });
                        alert("✅ Yess! Dados migrados com sucesso!");
                        window.location.reload();
                    } catch (err) {
                        alert("❌ Erro de permissão do Firebase ao salvar.\nMotivo: " + err.message);
                    }
                };
                reader.readAsText(file);
                event.target.value = null;
            };

            // ================= CÁLCULO GERAL DE CUSTOS =================
            const getIngredientUnitCost = (ingId, qty) => {
                const ing = ingredients.find(i => i.id === ingId);
                if (!ing || !ing.cost || !ing.qty) return 0;
                const unitCost = ing.cost / ing.qty;
                let ratio = (ing.unit === 'kg' || ing.unit === 'L') ? 0.001 : 1;
                return unitCost * (parseFloat(qty || 0) * ratio);
            };

            const calculateItemCost = (itemIngredients) => {
                if (!itemIngredients || !Array.isArray(itemIngredients)) return 0;
                return itemIngredients.reduce((total, req) => total + getIngredientUnitCost(req.ingredientId, req.qty), 0);
            };

            const calculateComboCost = (comboItems) => {
                if (!comboItems || !Array.isArray(comboItems)) return 0;
                return comboItems.reduce((total, item) => {
                    if (!item.itemId || !item.qty) return total;
                    const qty = parseFloat(item.qty);
                    if (item.type === 'recipe') {
                        const rec = recipes.find(r => r.id === item.itemId);
                        return total + (rec ? calculateItemCost(rec.ingredients) * qty : 0);
                    } else if (item.type === 'complement') {
                        const comp = complements.find(c => c.id === item.itemId);
                        return total + (comp ? calculateItemCost(comp.ingredients) * qty : 0);
                    } else {
                        return total + getIngredientUnitCost(item.itemId, qty);
                    }
                }, 0);
            };

            const getRecipeCategoryStyle = (cat) => {
                switch(cat) {
                    case 'Hambúrgueres': return 'bg-orange-100 text-orange-700 border-orange-200';
                    case 'Acompanhamentos': return 'bg-blue-100 text-blue-700 border-blue-200';
                    case 'Bebidas': return 'bg-cyan-100 text-cyan-700 border-cyan-200';
                    case 'Sobremesas': return 'bg-pink-100 text-pink-700 border-pink-200';
                    case 'Molhos Caseiros': return 'bg-emerald-100 text-emerald-700 border-emerald-200';
                    case 'Smash': return 'bg-purple-100 text-purple-700 border-purple-200';
                    case 'Promocionais': return 'bg-amber-100 text-amber-700 border-amber-200';
                    case 'Família': return 'bg-red-100 text-red-700 border-red-200';
                    case 'Extras': return 'bg-indigo-100 text-indigo-700 border-indigo-200';
                    case 'Molhos': return 'bg-fuchsia-100 text-fuchsia-700 border-fuchsia-200';
                    default: return 'bg-slate-100 text-slate-700 border-slate-200';
                }
            };

            // ================= LÓGICA GERAL CRUD =================
            const saveToFirebase = async (collectionName, list) => {
                const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                await db.doc(pathCmv).set({ [collectionName]: list }, { merge: true });
            };

            const handleDuplicate = async (collectionName, item, list) => {
                if (!user) return;
                const newItem = { ...item, id: crypto.randomUUID(), name: `${item.name} (Cópia)` };
                await saveToFirebase(collectionName, [...list, newItem]);
                alert("Cópia criada com sucesso!");
            };

            const handleDelete = async (collectionName, id, list) => {
                if(window.confirm("Tem a certeza que deseja eliminar este item?")) {
                    await saveToFirebase(collectionName, list.filter(i => i.id !== id));
                }
            };

            // ================= INSUMOS =================
            const handleSaveIngredient = async (e) => {
                e.preventDefault();
                const targetId = ingForm.id || crypto.randomUUID();
                const list = [...ingredients];
                const index = list.findIndex(i => i.id === targetId);
                const record = { id: targetId, name: ingForm.name, category: ingForm.category, cost: parseFloat(ingForm.cost), unit: ingForm.unit, qty: parseFloat(ingForm.qty) };
                if (index > -1) list[index] = record; else list.push(record);
                await saveToFirebase('ingredients', list);
                setIsIngModalOpen(false);
            };

            const openIngModal = (ing = null) => {
                setIngForm(ing ? { ...ing } : { id: '', name: '', category: ingredientCategories[0] || 'Outros', cost: '', unit: 'g', qty: '' });
                setIsIngModalOpen(true);
            };

            // ================= FICHAS TÉCNICAS =================
            const handleSaveRecipe = async (e) => {
                e.preventDefault();
                const targetId = recipeForm.id || crypto.randomUUID();
                const list = [...recipes];
                const index = list.findIndex(r => r.id === targetId);
                const record = { ...recipeForm, id: targetId, sellingPrice: parseFloat(recipeForm.sellingPrice), ingredients: recipeForm.ingredients.filter(i => i.ingredientId && parseFloat(i.qty) > 0) };
                if (index > -1) list[index] = record; else list.push(record);
                await saveToFirebase('recipes', list);
                setIsRecipeModalOpen(false);
            };

            const openRecipeModal = (recipe = null) => {
                setRecipeForm(recipe ? { ...recipe, ingredients: [...(recipe.ingredients || [])] } : { id: '', name: '', category: recipeCategories[0] || 'Hambúrgueres', sellingPrice: '', ingredients: [], ignoreCMV: false });
                setIsRecipeModalOpen(true);
            };

            // ================= COMPLEMENTOS =================
            const handleSaveComplement = async (e) => {
                e.preventDefault();
                const targetId = compForm.id || crypto.randomUUID();
                const list = [...complements];
                const index = list.findIndex(r => r.id === targetId);
                const record = { ...compForm, id: targetId, sellingPrice: parseFloat(compForm.sellingPrice), ingredients: compForm.ingredients.filter(i => i.ingredientId && parseFloat(i.qty) > 0) };
                if (index > -1) list[index] = record; else list.push(record);
                await saveToFirebase('complements', list);
                setIsCompModalOpen(false);
            };

            const openCompModal = (comp = null) => {
                setCompForm(comp ? { ...comp, ingredients: [...(comp.ingredients || [])] } : { id: '', name: '', category: complementCategories[0] || 'Extras', sellingPrice: '', ingredients: [], ignoreCMV: false });
                setIsCompModalOpen(true);
            };

            // ================= COMBOS =================
            const handleSaveCombo = async (e) => {
                e.preventDefault();
                const targetId = comboForm.id || crypto.randomUUID();
                const list = [...combos];
                const index = list.findIndex(r => r.id === targetId);
                const record = { ...comboForm, id: targetId, sellingPrice: parseFloat(comboForm.sellingPrice), items: comboForm.items.filter(i => i.itemId && parseFloat(i.qty) > 0) };
                if (index > -1) list[index] = record; else list.push(record);
                await saveToFirebase('combos', list);
                setIsComboModalOpen(false);
            };

            const openComboModal = (combo = null) => {
                setComboForm(combo ? { ...combo, items: [...(combo.items || [])] } : { id: '', name: '', category: comboCategories[0] || 'Promocionais', sellingPrice: '', items: [], ignoreCMV: false });
                setIsComboModalOpen(true);
            };

            const updateComboItem = (index, field, value) => {
                const newItems = [...comboForm.items];
                newItems[index][field] = value;
                if (field === 'type') newItems[index].itemId = ''; // Reset ID if type changes
                setComboForm(prev => ({ ...prev, items: newItems }));
            };

            // ================= AGRUPADORES =================
            const groupedIngredients = useMemo(() => ingredients.reduce((acc, ing) => { const cat = ing.category || 'Outros'; if (!acc[cat]) acc[cat] = []; acc[cat].push(ing); return acc; }, {}), [ingredients]);
            
            const filteredRecipes = useMemo(() => recipes.filter(r => (r.name || '').toLowerCase().includes(recipeSearch.toLowerCase()) && (recipeCatFilter === '' || (r.category || 'Outros') === recipeCatFilter)), [recipes, recipeSearch, recipeCatFilter]);
            const groupedRecipes = useMemo(() => filteredRecipes.reduce((acc, recipe) => { const cat = recipe.category || 'Outros'; if (!acc[cat]) acc[cat] = []; acc[cat].push(recipe); return acc; }, {}), [filteredRecipes]);
            
            const filteredComplements = useMemo(() => complements.filter(c => (c.name || '').toLowerCase().includes(compSearch.toLowerCase()) && (compCatFilter === '' || (c.category || 'Outros') === compCatFilter)), [complements, compSearch, compCatFilter]);
            const groupedComplements = useMemo(() => filteredComplements.reduce((acc, comp) => { const cat = comp.category || 'Outros'; if (!acc[cat]) acc[cat] = []; acc[cat].push(comp); return acc; }, {}), [filteredComplements]);

            const filteredCombos = useMemo(() => combos.filter(c => (c.name || '').toLowerCase().includes(comboSearch.toLowerCase()) && (comboCatFilter === '' || (c.category || 'Outros') === comboCatFilter)), [combos, comboSearch, comboCatFilter]);
            const groupedCombos = useMemo(() => filteredCombos.reduce((acc, combo) => { const cat = combo.category || 'Outros'; if (!acc[cat]) acc[cat] = []; acc[cat].push(combo); return acc; }, {}), [filteredCombos]);

            // Renderização
            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C] text-[#F8CC82] font-black uppercase tracking-widest">Iniciando ERP Cantinho...</div>;

            if (!user || user.isAnonymous) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#1A202C] p-4">
                        <div className="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
                            <h2 className="text-xl font-black uppercase text-slate-800 mb-2">ERP Tribo Burger</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-6">Inicie sessão para acessar o sistema unificado</p>
                            <button onClick={async () => { const provider = new firebase.auth.GoogleAuthProvider(); await auth.signInWithPopup(provider); }} className="w-full bg-black text-[#F8CC82] p-4 rounded-xl font-black text-xs uppercase flex items-center justify-center gap-2">
                                <Icon name="lock" size={16}/> Entrar com Google
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 shadow-xl">
                        <div className="max-w-7xl mx-auto flex flex-col gap-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-[#F27A18] flex items-center justify-center font-black text-black text-lg">TB</div>
                                    <div>
                                        <h1 className="text-lg font-black text-[#F8CC82] uppercase leading-none">ERP do Cantinho</h1>
                                        <span className="text-[9px] font-black text-emerald-400 tracking-widest uppercase">Sistema Integrado Conectado</span>
                                    </div>
                                </div>
                                <button onClick={()=>auth.signOut()} className="text-[10px] font-black uppercase text-slate-400 hover:text-white">Sair</button>
                            </div>

                            <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                                <div className="flex gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/10 shrink-0">
                                    <span className="flex items-center px-3 text-[9px] font-black uppercase text-slate-400 border-r border-white/10"><Icon name="wallet" size={12} className="mr-1"/> Finanças</span>
                                    {['fin_dashboard', 'saldos', 'vendas', 'dre'].map(t => (
                                        <button key={t} onClick={()=>setActiveTab(t)} className={"px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all " + (activeTab === t ? "tab-active" : "text-slate-400 hover:text-white")}>
                                            {t.replace('fin_', '')}
                                        </button>
                                    ))}
                                </div>

                                <div className="flex gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/10 shrink-0">
                                    <span className="flex items-center px-3 text-[9px] font-black uppercase text-[#F27A18] border-r border-white/10"><Icon name="pie-chart" size={12} className="mr-1"/> Custos & CMV</span>
                                    {['cmv_dashboard', 'insumos', 'fichas', 'complementos', 'combos'].map(t => (
                                        <button key={t} onClick={()=>setActiveTab(t)} className={"px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all " + (activeTab === t ? "bg-[#F27A18] text-black rounded-xl shadow" : "text-slate-400 hover:text-white")}>
                                            {t.replace('cmv_', '')}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="p-4 max-w-7xl mx-auto w-full flex-1 space-y-6">
                        
                        {/* ======================= ABA INSUMOS ======================= */}
                        {activeTab === 'insumos' && (
                            <div className="space-y-6 fade-in">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-6 rounded-[2rem] border shadow-sm">
                                    <div>
                                        <h2 className="text-sm font-black uppercase tracking-widest text-slate-800">Gestão de Insumos</h2>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">Matéria-prima cadastrada: {ingredients.length} itens</p>
                                    </div>
                                    <div className="flex gap-2 w-full md:w-auto overflow-x-auto pb-1">
                                        <input type="file" accept=".json" className="hidden" ref={fileInputRef} onChange={handleFileImport} />
                                        <button onClick={() => fileInputRef.current.click()} className="shrink-0 bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-3 rounded-xl flex items-center justify-center gap-2 text-[9px] font-black uppercase transition-all">
                                            <Icon name="upload" size={14}/> Arquivo .JSON
                                        </button>
                                        <button onClick={handlePasteImport} className="shrink-0 bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-3 rounded-xl flex items-center justify-center gap-2 text-[9px] font-black uppercase transition-all border border-blue-200">
                                            <Icon name="copy" size={14}/> Colar Dados
                                        </button>
                                        <button onClick={() => openIngModal()} className="shrink-0 btn-accent px-6 py-3 rounded-xl flex items-center justify-center gap-2 text-[10px]">
                                            <Icon name="plus" size={14}/> Novo Insumo
                                        </button>
                                    </div>
                                </div>

                                {ingredients.length === 0 ? (
                                    <div className="p-12 text-center text-slate-400 uppercase font-black text-xs glass-card rounded-[2.5rem] border-dashed">Nenhum insumo cadastrado.</div>
                                ) : (
                                    <div className="space-y-8">
                                        {Object.keys(groupedIngredients).sort().map(category => {
                                            const isCollapsed = ingCollapsed[category];
                                            return (
                                            <div key={category} className="space-y-4">

                                                                                <div className="text-right">
                                                                                    <span className="font-black text-slate-900 text-sm">{formatMoney(sellingPrice)}</span>
                                                                                    {temDesconto && <span className="block text-[9px] text-green-600 uppercase bg-green-50 px-1 py-0.5 rounded mt-0.5">-{descontoPct.toFixed(1)}% OFF</span>}
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ======================= MODAL DA FICHA TÉCNICA (RECEITA) ======================= */}
                        {isRecipeModalOpen && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 rounded-[2.5rem] shadow-2xl flex flex-col gap-6 scale-up-center">
                                    <div className="flex justify-between items-center border-b pb-3">
                                        <h3 className="text-sm font-black uppercase text-slate-800">{recipeForm.id ? 'Editar Ficha Técnica' : 'Nova Ficha Técnica'}</h3>
                                        <button onClick={()=>setIsRecipeModalOpen(false)} className="text-slate-400 hover:text-slate-800"><Icon name="x" size={20}/></button>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Nome do Produto</label>
                                            <input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none focus:border-[#F27A18]" placeholder="Ex: Tribo Burger Clássico" value={recipeForm.name} onChange={e=>setRecipeForm({...recipeForm, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Preço de Venda Praticado (R$)</label>
                                            <input type="number" step="0.01" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none focus:border-[#F27A18]" placeholder="Ex: 35.90" value={recipeForm.sellingPrice} onChange={e=>setRecipeForm({...recipeForm, sellingPrice: e.target.value})} />
                                        </div>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Categoria do Produto</label>
                                        <select className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none" value={recipeForm.category} onChange={e=>setRecipeForm({...recipeForm, category: e.target.value})}>
                                            {recipeCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="flex items-center gap-3 bg-slate-50 border border-slate-200 p-4 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
                                            <input type="checkbox" className="w-4 h-4 accent-[#F27A18]" checked={recipeForm.ignoreCMV} onChange={e=>setRecipeForm({...recipeForm, ignoreCMV: e.target.checked})} />
                                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Não considerar para o cálculo de CMV Geral (Ignorar)</span>
                                        </label>
                                    </div>

                                    <div className="border-t pt-4">
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="text-[10px] font-black uppercase text-slate-800">Composição (Ingredientes)</label>
                                            <button type="button" onClick={() => setRecipeForm(p => ({...p, ingredients: [...p.ingredients, { ingredientId: '', qty: '' }]}))} className="text-[9px] font-black uppercase bg-[#1A202C] text-[#F8CC82] px-4 py-2 rounded-xl hover:bg-black flex items-center gap-1 shadow"><Icon name="plus" size={14}/> Adicionar Item</button>
                                        </div>

                                        <div className="space-y-2">
                                            {recipeForm.ingredients.length === 0 && <p className="text-center text-[10px] uppercase font-bold text-slate-400 py-6 bg-slate-50 rounded-2xl border border-dashed">Nenhum ingrediente adicionado.</p>}
                                            {recipeForm.ingredients.map((ingItem, idx) => (
                                                <div key={idx} className="flex flex-col sm:flex-row items-center gap-2 bg-slate-50 p-2 rounded-xl border">
                                                    <select className="w-full sm:flex-1 p-3 bg-white border rounded-lg font-bold text-[10px] outline-none" value={ingItem.ingredientId} onChange={e => { const newIngs = [...recipeForm.ingredients]; newIngs[idx].ingredientId = e.target.value; setRecipeForm({...recipeForm, ingredients: newIngs}); }}>
                                                        <option value="">-- Selecione o Insumo --</option>
                                                        {ingredients.sort((a,b)=>a.name.localeCompare(b.name)).map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                                                    </select>
                                                    <div className="flex w-full sm:w-auto gap-2">
                                                        <input type="number" step="0.001" placeholder="Qtd" className="w-full sm:w-24 p-3 bg-white border rounded-lg font-bold text-[10px] text-center outline-none" value={ingItem.qty} onChange={e => { const newIngs = [...recipeForm.ingredients]; newIngs[idx].qty = e.target.value; setRecipeForm({...recipeForm, ingredients: newIngs}); }} />
                                                        <button type="button" onClick={() => { const newIngs = [...recipeForm.ingredients]; newIngs.splice(idx, 1); setRecipeForm({...recipeForm, ingredients: newIngs}); }} className="p-3 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 border border-red-100 shrink-0"><Icon name="trash-2" size={14}/></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-slate-800 text-white p-5 rounded-3xl flex justify-between items-center shadow-inner mt-2">
                                        <div className="text-left">
                                            <span className="text-[9px] font-black uppercase text-slate-400 block mb-1">Custo Total de Produção</span>
                                            <span className="text-2xl font-black text-[#F8CC82]">{formatMoney(calculateItemCost(recipeForm.ingredients))}</span>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[9px] font-black uppercase text-slate-400 block mb-1">CMV Estimado</span>
                                            <span className={"text-2xl font-black " + ((recipeForm.sellingPrice && (calculateItemCost(recipeForm.ingredients) / recipeForm.sellingPrice)*100 > parseFloat(cmvSettings.targetCMV||30)) ? "text-red-400" : "text-emerald-400")}>
                                                {recipeForm.sellingPrice > 0 ? ((calculateItemCost(recipeForm.ingredients) / recipeForm.sellingPrice) * 100).toFixed(1) : 0}%
                                            </span>
                                        </div>
                                    </div>

                                    <div className="flex gap-2 mt-2 pt-4 border-t">
                                        <button onClick={handleSaveRecipe} className="flex-1 btn-accent p-4 rounded-2xl text-[10px]">Gravar Ficha Técnica</button>
                                        <button onClick={()=>setIsRecipeModalOpen(false)} className="px-8 bg-slate-200 text-slate-600 font-black uppercase text-[10px] rounded-2xl">Cancelar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ======================= MODAL DO COMPLEMENTO ======================= */}
                        {isCompModalOpen && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 rounded-[2.5rem] shadow-2xl flex flex-col gap-6 scale-up-center">
                                    <div className="flex justify-between items-center border-b pb-3">
                                        <h3 className="text-sm font-black uppercase text-slate-800">{compForm.id ? 'Editar Complemento' : 'Novo Complemento'}</h3>
                                        <button onClick={()=>setIsCompModalOpen(false)} className="text-slate-400 hover:text-slate-800"><Icon name="x" size={20}/></button>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Nome do Complemento</label>
                                            <input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none focus:border-[#F27A18]" placeholder="Ex: Bacon Extra" value={compForm.name} onChange={e=>setCompForm({...compForm, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Preço de Venda Praticado (R$)</label>
                                            <input type="number" step="0.01" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none focus:border-[#F27A18]" placeholder="Ex: 4.50" value={compForm.sellingPrice} onChange={e=>setCompForm({...compForm, sellingPrice: e.target.value})} />
                                        </div>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Categoria do Produto</label>
                                        <select className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none" value={compForm.category} onChange={e=>setCompForm({...compForm, category: e.target.value})}>
                                            {complementCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="flex items-center gap-3 bg-slate-50 border border-slate-200 p-4 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
                                            <input type="checkbox" className="w-4 h-4 accent-[#F27A18]" checked={compForm.ignoreCMV} onChange={e=>setCompForm({...compForm, ignoreCMV: e.target.checked})} />
                                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Não considerar para o cálculo de CMV Geral (Ignorar)</span>
                                        </label>
                                    </div>

                                    <div className="border-t pt-4">
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="text-[10px] font-black uppercase text-slate-800">Composição (Ingredientes)</label>
                                            <button type="button" onClick={() => setCompForm(p => ({...p, ingredients: [...p.ingredients, { ingredientId: '', qty: '' }]}))} className="text-[9px] font-black uppercase bg-[#1A202C] text-[#F8CC82] px-4 py-2 rounded-xl hover:bg-black flex items-center gap-1 shadow"><Icon name="plus" size={14}/> Adicionar Item</button>
                                        </div>

                                        <div className="space-y-2">
                                            {compForm.ingredients.length === 0 && <p className="text-center text-[10px] uppercase font-bold text-slate-400 py-6 bg-slate-50 rounded-2xl border border-dashed">Nenhum ingrediente adicionado.</p>}
                                            {compForm.ingredients.map((ingItem, idx) => (
                                                <div key={idx} className="flex flex-col sm:flex-row items-center gap-2 bg-slate-50 p-2 rounded-xl border">
                                                    <select className="w-full sm:flex-1 p-3 bg-white border rounded-lg font-bold text-[10px] outline-none" value={ingItem.ingredientId} onChange={e => { const newIngs = [...compForm.ingredients]; newIngs[idx].ingredientId = e.target.value; setCompForm({...compForm, ingredients: newIngs}); }}>
                                                        <option value="">-- Selecione o Insumo --</option>
                                                        {ingredients.sort((a,b)=>a.name.localeCompare(b.name)).map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                                                    </select>
                                                    <div className="flex w-full sm:w-auto gap-2">
                                                        <input type="number" step="0.001" placeholder="Qtd" className="w-full sm:w-24 p-3 bg-white border rounded-lg font-bold text-[10px] text-center outline-none" value={ingItem.qty} onChange={e => { const newIngs = [...compForm.ingredients]; newIngs[idx].qty = e.target.value; setCompForm({...compForm, ingredients: newIngs}); }} />
                                                        <button type="button" onClick={() => { const newIngs = [...compForm.ingredients]; newIngs.splice(idx, 1); setCompForm({...compForm, ingredients: newIngs}); }} className="p-3 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 border border-red-100 shrink-0"><Icon name="trash-2" size={14}/></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-slate-800 text-white p-5 rounded-3xl flex justify-between items-center shadow-inner mt-2">
                                        <div className="text-left">
                                            <span className="text-[9px] font-black uppercase text-slate-400 block mb-1">Custo Total do Extra</span>
                                            <span className="text-2xl font-black text-[#F8CC82]">{formatMoney(calculateItemCost(compForm.ingredients))}</span>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[9px] font-black uppercase text-slate-400 block mb-1">CMV Estimado</span>
                                            <span className={"text-2xl font-black " + ((compForm.sellingPrice && (calculateItemCost(compForm.ingredients) / compForm.sellingPrice)*100 > parseFloat(cmvSettings.targetCMV||30)) ? "text-red-400" : "text-emerald-400")}>
                                                {compForm.sellingPrice > 0 ? ((calculateItemCost(compForm.ingredients) / compForm.sellingPrice) * 100).toFixed(1) : 0}%
                                            </span>
                                        </div>
                                    </div>

                                    <div className="flex gap-2 mt-2 pt-4 border-t">
                                        <button onClick={handleSaveComplement} className="flex-1 btn-accent p-4 rounded-2xl text-[10px]">Gravar Complemento</button>
                                        <button onClick={()=>setIsCompModalOpen(false)} className="px-8 bg-slate-200 text-slate-600 font-black uppercase text-[10px] rounded-2xl">Cancelar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ======================= MODAL DO COMBO ======================= */}
                        {isComboModalOpen && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 rounded-[2.5rem] shadow-2xl flex flex-col gap-6 scale-up-center">
                                    <div className="flex justify-between items-center border-b pb-3">
                                        <h3 className="text-sm font-black uppercase text-slate-800">{comboForm.id ? 'Editar Combo' : 'Novo Combo'}</h3>
                                        <button onClick={()=>setIsComboModalOpen(false)} className="text-slate-400 hover:text-slate-800"><Icon name="x" size={20}/></button>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Nome do Combo</label>
                                            <input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none focus:border-[#F27A18]" placeholder="Ex: Combo Família" value={comboForm.name} onChange={e=>setComboForm({...comboForm, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Preço de Venda do Combo (R$)</label>
                                            <input type="number" step="0.01" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none focus:border-[#F27A18]" placeholder="Ex: 50.00" value={comboForm.sellingPrice} onChange={e=>setComboForm({...comboForm, sellingPrice: e.target.value})} />
                                        </div>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Categoria do Produto</label>
                                        <select className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none" value={comboForm.category} onChange={e=>setComboForm({...comboForm, category: e.target.value})}>
                                            {comboCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="flex items-center gap-3 bg-slate-50 border border-slate-200 p-4 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
                                            <input type="checkbox" className="w-4 h-4 accent-[#F27A18]" checked={comboForm.ignoreCMV} onChange={e=>setComboForm({...comboForm, ignoreCMV: e.target.checked})} />
                                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Não considerar para o cálculo de CMV Geral (Ignorar)</span>
                                        </label>
                                    </div>

                                    <div className="border-t pt-4">
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="text-[10px] font-black uppercase text-slate-800">Itens do Combo</label>
                                            <button type="button" onClick={() => setComboForm(p => ({...p, items: [...p.items, { type: 'recipe', itemId: '', qty: '' }]}))} className="text-[9px] font-black uppercase bg-[#1A202C] text-[#F8CC82] px-4 py-2 rounded-xl hover:bg-black flex items-center gap-1 shadow"><Icon name="plus" size={14}/> Adicionar Item</button>
                                        </div>

                                        <div className="space-y-2">
                                            {comboForm.items.length === 0 && <p className="text-center text-[10px] uppercase font-bold text-slate-400 py-6 bg-slate-50 rounded-2xl border border-dashed">Nenhum item adicionado.</p>}
                                            {comboForm.items.map((comboItem, idx) => (
                                                <div key={idx} className="flex flex-col md:flex-row items-center gap-2 bg-slate-50 p-2 rounded-xl border">
                                                    <select className="w-full md:w-32 p-3 bg-white border rounded-lg font-bold text-[10px] outline-none" value={comboItem.type} onChange={e => { const newItems = [...comboForm.items]; newItems[idx].type = e.target.value; newItems[idx].itemId = ''; setComboForm({...comboForm, items: newItems}); }}>
                                                        <option value="recipe">🍔 Ficha</option>
                                                        <option value="complement">🧩 Comp.</option>
                                                        <option value="ingredient">📦 Insumo</option>
                                                    </select>
                                                    <select className="w-full md:flex-1 p-3 bg-white border rounded-lg font-bold text-[10px] outline-none" value={comboItem.itemId} onChange={e => { const newItems = [...comboForm.items]; newItems[idx].itemId = e.target.value; setComboForm({...comboForm, items: newItems}); }}>
                                                        <option value="">-- Escolher --</option>
                                                        {comboItem.type === 'recipe' && recipes.sort((a,b)=>a.name.localeCompare(b.name)).map(i => <option key={i.id} value={i.id}>Ficha: {i.name}</option>)}
                                                        {comboItem.type === 'complement' && complements.sort((a,b)=>a.name.localeCompare(b.name)).map(i => <option key={i.id} value={i.id}>Comp: {i.name}</option>)}
                                                        {comboItem.type === 'ingredient' && ingredients.sort((a,b)=>a.name.localeCompare(b.name)).map(i => <option key={i.id} value={i.id}>Insumo: {i.name}</option>)}
                                                    </select>
                                                    <div className="flex w-full md:w-auto gap-2">
                                                        <input type="number" step="0.001" placeholder="Qtd" className="w-full md:w-24 p-3 bg-white border rounded-lg font-bold text-[10px] text-center outline-none" value={comboItem.qty} onChange={e => { const newItems = [...comboForm.items]; newItems[idx].qty = e.target.value; setComboForm({...comboForm, items: newItems}); }} />
                                                        <button type="button" onClick={() => { const newItems = [...comboForm.items]; newItems.splice(idx, 1); setComboForm({...comboForm, items: newItems}); }} className="p-3 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 border border-red-100 shrink-0"><Icon name="trash-2" size={14}/></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-slate-800 text-white p-5 rounded-3xl flex justify-between items-center shadow-inner mt-2">
                                        <div className="text-left">
                                            <span className="text-[9px] font-black uppercase text-slate-400 block mb-1">Custo Somado do Combo</span>
                                            <span className="text-2xl font-black text-[#F8CC82]">{formatMoney(calculateComboCost(comboForm.items))}</span>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[9px] font-black uppercase text-slate-400 block mb-1">CMV Estimado do Combo</span>
                                            <span className={"text-2xl font-black " + ((comboForm.sellingPrice && (calculateComboCost(comboForm.items) / comboForm.sellingPrice)*100 > parseFloat(cmvSettings.targetCMV||30)) ? "text-red-400" : "text-emerald-400")}>
                                                {comboForm.sellingPrice > 0 ? ((calculateComboCost(comboForm.items) / comboForm.sellingPrice) * 100).toFixed(1) : 0}%
                                            </span>
                                        </div>
                                    </div>

                                    <div className="flex gap-2 mt-2 pt-4 border-t">
                                        <button onClick={handleSaveCombo} className="flex-1 btn-accent p-4 rounded-2xl text-[10px]">Gravar Combo</button>
                                        <button onClick={()=>setIsComboModalOpen(false)} className="px-8 bg-slate-200 text-slate-600 font-black uppercase text-[10px] rounded-2xl">Cancelar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ======================= ABAS EM CONSTRUÇÃO ======================= */}
                        {['saldos', 'vendas', 'dre'].includes(activeTab) && (
                            <div className="glass-card p-12 rounded-[3rem] text-center shadow-sm flex flex-col justify-center items-center gap-4">
                                <Icon name="sprout" size={40} className="text-emerald-400" />
                                <h2 className="text-xl font-black uppercase text-slate-800">Em Construção</h2>
                                <p className="text-xs font-bold text-slate-500 uppercase">A aba <strong>{activeTab.toUpperCase()}</strong> será implementada na Etapa 4.</p>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
