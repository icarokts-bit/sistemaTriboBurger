<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | ERP do Cantinho</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.21.0/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase Compat V10 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #D97757; color: #FFF; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-primary { background-color: #000; color: #F8CC82; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .btn-accent { background-color: #F27A18; color: #000; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .btn-accent:active { transform: scale(0.95); }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ node: containerRef.current, attrs: { width: size, height: size, class: className } });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('fin_dashboard');
            
            // Dados Financeiros
            const [transactions, setTransactions] = useState([]);
            const [accounts, setAccounts] = useState([]);
            
            // Dados CMV
            const [ingredients, setIngredients] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [cmvSettings, setCmvSettings] = useState({ targetCMV: 30, tax: 6, apps: 0, card: 2.5, ifoodTax: 12 });
            
            const [ingredientCategories, setIngredientCategories] = useState(['Proteínas', 'Pães', 'Queijos', 'Molhos', 'Vegetais/Hortifrúti', 'Embalagens', 'Outros']);
            const [recipeCategories, setRecipeCategories] = useState(['Hambúrgueres', 'Acompanhamentos', 'Bebidas', 'Sobremesas', 'Molhos Caseiros', 'Outros', 'Smash']);

            // Modais e Formulários
            const [isIngModalOpen, setIsIngModalOpen] = useState(false);
            const [ingForm, setIngForm] = useState({ id: '', name: '', category: 'Outros', cost: '', unit: 'g', qty: '' });

            const [isRecipeModalOpen, setIsRecipeModalOpen] = useState(false);
            const [recipeForm, setRecipeForm] = useState({ id: '', name: '', category: 'Hambúrgueres', sellingPrice: '', ingredients: [], ignoreCMV: false });

            // Filtros de Fichas
            const [recipeSearch, setRecipeSearch] = useState('');
            const [recipeCatFilter, setRecipeCatFilter] = useState('');
            const [recipeCollapsed, setRecipeCollapsed] = useState({});

            const fileInputRef = useRef(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => { 
                    setUser(u); 
                    setLoading(false); 
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || user.isAnonymous) return;
                
                const pathFin = "artifacts/tribo-burger-financeiro/users/" + user.uid;
                const unsubTx = db.collection(pathFin + "/transactions").onSnapshot(s => setTransactions(s.docs.map(d => Object.assign({ id: d.id }, d.data()))));
                const unsubAcc = db.collection(pathFin + "/accounts").onSnapshot(s => setAccounts(s.docs.map(d => Object.assign({ id: d.id }, d.data()))));

                const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                const unsubCmv = db.doc(pathCmv).onSnapshot(s => {
                    if(s.exists) {
                        const data = s.data();
                        setIngredients(data.ingredients || []);
                        setRecipes(data.recipes || []);
                        setCmvSettings(data.settings || { targetCMV: 30, tax: 6, apps: 0, card: 2.5, ifoodTax: 12 });
                        if(data.ingredientCategories) setIngredientCategories(data.ingredientCategories);
                        if(data.recipeCategories) setRecipeCategories(data.recipeCategories);
                    }
                });

                return () => { unsubTx(); unsubAcc(); unsubCmv(); };
            }, [user]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            // ================= LÓGICA DE IMPORTAÇÃO (MANUTENÇÃO) =================
            const handlePasteImport = async () => {
                const text = prompt("Cole aqui todo o texto do backup que você copiou no sistema antigo:");
                if (!text || text.trim() === "") return;

                let data;
                try {
                    data = JSON.parse(text);
                    if (!data.ingredients && !data.recipes) {
                        alert("❌ Formato inválido! Certifique-se de que copiou o texto inteiro.");
                        return;
                    }
                } catch (err) {
                    alert("❌ Erro ao ler o texto copiado: " + err.message);
                    return;
                }

                try {
                    const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                    await db.doc(pathCmv).set(data, { merge: true });
                    alert("✅ Yess! Os dados do Cantinho foram colados e migrados com sucesso!");
                    window.location.reload();
                } catch (err) {
                    alert("❌ Erro no Firebase: " + err.message);
                }
            };

            const handleFileImport = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    let data;
                    try {
                        let text = e.target.result;
                        if (!text || text.trim() === '') throw new Error("O arquivo parece estar vazio.");
                        data = JSON.parse(text);
                    } catch (err) {
                        alert("❌ Erro ao interpretar o arquivo JSON.\nMotivo: " + err.message);
                        return;
                    }

                    try {
                        const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                        await db.doc(pathCmv).set(data, { merge: true });
                        alert("✅ Yess! Dados migrados com sucesso!");
                        window.location.reload();
                    } catch (err) {
                        alert("❌ Erro de permissão do Firebase ao salvar.\nMotivo: " + err.message);
                    }
                };
                reader.readAsText(file);
                event.target.value = null;
            };

            // ================= CÁLCULO GERAL DE CUSTOS =================
            const getIngredientUnitCost = (ingId, qty) => {
                const ing = ingredients.find(i => i.id === ingId);
                if (!ing || !ing.cost || !ing.qty) return 0;
                const unitCost = ing.cost / ing.qty;
                let ratio = (ing.unit === 'kg' || ing.unit === 'L') ? 0.001 : 1;
                return unitCost * (parseFloat(qty || 0) * ratio);
            };

            const calculateItemCost = (itemIngredients) => {
                if (!itemIngredients || !Array.isArray(itemIngredients)) return 0;
                return itemIngredients.reduce((total, req) => total + getIngredientUnitCost(req.ingredientId, req.qty), 0);
            };

            const getRecipeCategoryStyle = (cat) => {
                switch(cat) {
                    case 'Hambúrgueres': return 'bg-orange-100 text-orange-700 border-orange-200';
                    case 'Acompanhamentos': return 'bg-blue-100 text-blue-700 border-blue-200';
                    case 'Bebidas': return 'bg-cyan-100 text-cyan-700 border-cyan-200';
                    case 'Sobremesas': return 'bg-pink-100 text-pink-700 border-pink-200';
                    case 'Molhos Caseiros': return 'bg-emerald-100 text-emerald-700 border-emerald-200';
                    case 'Smash': return 'bg-purple-100 text-purple-700 border-purple-200';
                    default: return 'bg-slate-100 text-slate-700 border-slate-200';
                }
            };

            // ================= LÓGICA DE INSUMOS =================
            const handleSaveIngredient = async (e) => {
                e.preventDefault();
                if (!user) return;
                
                const targetId = ingForm.id || crypto.randomUUID();
                const list = [...ingredients];
                const index = list.findIndex(i => i.id === targetId);
                const record = { 
                    id: targetId, 
                    name: ingForm.name, 
                    category: ingForm.category, 
                    cost: parseFloat(ingForm.cost), 
                    unit: ingForm.unit, 
                    qty: parseFloat(ingForm.qty) 
                };

                if (index > -1) list[index] = record;
                else list.push(record);

                const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                await db.doc(pathCmv).set({ ingredients: list }, { merge: true });
                setIsIngModalOpen(false);
            };

            const handleDeleteIngredient = async (id) => {
                if(window.confirm("Excluir este insumo permanentemente?")) {
                    const list = ingredients.filter(i => i.id !== id);
                    const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                    await db.doc(pathCmv).set({ ingredients: list }, { merge: true });
                }
            };

            const openIngModal = (ing = null) => {
                if(ing) {
                    setIngForm({ id: ing.id, name: ing.name, category: ing.category, cost: ing.cost, unit: ing.unit, qty: ing.qty });
                } else {
                    setIngForm({ id: '', name: '', category: ingredientCategories[0] || 'Outros', cost: '', unit: 'g', qty: '' });
                }
                setIsIngModalOpen(true);
            };

            // ================= LÓGICA DE FICHAS TÉCNICAS (RECEITAS) =================
            const handleSaveRecipe = async (e) => {
                e.preventDefault();
                if (!user) return;
                
                const targetId = recipeForm.id || crypto.randomUUID();
                const list = [...recipes];
                const index = list.findIndex(r => r.id === targetId);
                const record = { 
                    id: targetId, 
                    name: recipeForm.name, 
                    category: recipeForm.category, 
                    sellingPrice: parseFloat(recipeForm.sellingPrice), 
                    ingredients: recipeForm.ingredients.filter(i => i.ingredientId && parseFloat(i.qty) > 0),
                    ignoreCMV: recipeForm.ignoreCMV
                };

                if (index > -1) list[index] = record;
                else list.push(record);

                const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                await db.doc(pathCmv).set({ recipes: list }, { merge: true });
                setIsRecipeModalOpen(false);
            };

            const handleDeleteRecipe = async (id) => {
                if(window.confirm("Tem a certeza que deseja eliminar esta Ficha Técnica?")) {
                    const list = recipes.filter(r => r.id !== id);
                    const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                    await db.doc(pathCmv).set({ recipes: list }, { merge: true });
                }
            };

            const handleDuplicateRecipe = async (recipe) => {
                if (!user) return;
                const newRecipe = { 
                    ...recipe, 
                    id: crypto.randomUUID(), 
                    name: `${recipe.name} (Cópia)` 
                };
                const list = [...recipes, newRecipe];
                const pathCmv = "artifacts/tribo-burger-financeiro/users/" + user.uid + "/cmv_data/state";
                await db.doc(pathCmv).set({ recipes: list }, { merge: true });
                alert("Ficha duplicada com sucesso!");
            };

            const openRecipeModal = (recipe = null) => {
                if(recipe) {
                    setRecipeForm({ 
                        id: recipe.id, 
                        name: recipe.name, 
                        category: recipe.category, 
                        sellingPrice: recipe.sellingPrice, 
                        ingredients: [...(recipe.ingredients || [])],
                        ignoreCMV: recipe.ignoreCMV || false
                    });
                } else {
                    setRecipeForm({ 
                        id: '', 
                        name: '', 
                        category: recipeCategories[0] || 'Hambúrgueres', 
                        sellingPrice: '', 
                        ingredients: [],
                        ignoreCMV: false
                    });
                }
                setIsRecipeModalOpen(true);
            };

            const addRecipeIngredient = () => {
                setRecipeForm(prev => ({
                    ...prev,
                    ingredients: [...prev.ingredients, { ingredientId: '', qty: '' }]
                }));
            };

            const updateRecipeIngredient = (index, field, value) => {
                const newIngredients = [...recipeForm.ingredients];
                newIngredients[index][field] = value;
                setRecipeForm(prev => ({ ...prev, ingredients: newIngredients }));
            };

            const removeRecipeIngredient = (index) => {
                const newIngredients = [...recipeForm.ingredients];
                newIngredients.splice(index, 1);
                setRecipeForm(prev => ({ ...prev, ingredients: newIngredients }));
            };

            const toggleRecipeCat = (cat) => {
                setRecipeCollapsed(prev => ({ ...prev, [cat]: !prev[cat] }));
            };

            // Filtragem e Agrupamento
            const filteredRecipes = useMemo(() => {
                return recipes.filter(r => {
                    const matchesSearch = (r.name || '').toLowerCase().includes(recipeSearch.toLowerCase());
                    const matchesCat = recipeCatFilter === '' || (r.category || 'Outros') === recipeCatFilter;
                    return matchesSearch && matchesCat;
                });
            }, [recipes, recipeSearch, recipeCatFilter]);

            const groupedRecipes = useMemo(() => {
                return filteredRecipes.reduce((acc, recipe) => {
                    const cat = recipe.category || 'Outros';
                    if (!acc[cat]) acc[cat] = [];
                    acc[cat].push(recipe);
                    return acc;
                }, {});
            }, [filteredRecipes]);

            const sortedCategories = useMemo(() => {
                return Object.keys(groupedRecipes).sort();
            }, [groupedRecipes]);

            // Renderização da Tela
            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C] text-[#F8CC82] font-black uppercase tracking-widest">Iniciando ERP Cantinho...</div>;

            if (!user || user.isAnonymous) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#1A202C] p-4">
                        <div className="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
                            <h2 className="text-xl font-black uppercase text-slate-800 mb-2">ERP Tribo Burger</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-6">Inicie sessão para acessar o sistema unificado</p>
                            <button onClick={async () => { const provider = new firebase.auth.GoogleAuthProvider(); await auth.signInWithPopup(provider); }} className="w-full bg-black text-[#F8CC82] p-4 rounded-xl font-black text-xs uppercase flex items-center justify-center gap-2">
                                <Icon name="lock" size={16}/> Entrar com Google
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 shadow-xl">
                        <div className="max-w-7xl mx-auto flex flex-col gap-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-[#F27A18] flex items-center justify-center font-black text-black text-lg">TB</div>
                                    <div>
                                        <h1 className="text-lg font-black text-[#F8CC82] uppercase leading-none">ERP do Cantinho</h1>
                                        <span className="text-[9px] font-black text-emerald-400 tracking-widest uppercase">Sistema Integrado Conectado</span>
                                    </div>
                                </div>
                                <button onClick={()=>auth.signOut()} className="text-[10px] font-black uppercase text-slate-400 hover:text-white">Sair</button>
                            </div>

                            <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                                <div className="flex gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/10 shrink-0">
                                    <span className="flex items-center px-3 text-[9px] font-black uppercase text-slate-400 border-r border-white/10"><Icon name="wallet" size={12} className="mr-1"/> Finanças</span>
                                    {['fin_dashboard', 'saldos', 'vendas', 'dre'].map(t => (
                                        <button key={t} onClick={()=>setActiveTab(t)} className={"px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all " + (activeTab === t ? "tab-active" : "text-slate-400 hover:text-white")}>
                                            {t.replace('fin_', '')}
                                        </button>
                                    ))}
                                </div>

                                <div className="flex gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/10 shrink-0">
                                    <span className="flex items-center px-3 text-[9px] font-black uppercase text-[#F27A18] border-r border-white/10"><Icon name="pie-chart" size={12} className="mr-1"/> Custos & CMV</span>
                                    {['cmv_dashboard', 'insumos', 'fichas', 'combos'].map(t => (
                                        <button key={t} onClick={()=>setActiveTab(t)} className={"px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all " + (activeTab === t ? "bg-[#F27A18] text-black rounded-xl shadow" : "text-slate-400 hover:text-white")}>
                                            {t.replace('cmv_', '')}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="p-4 max-w-7xl mx-auto w-full flex-1 space-y-6">
                        
                        {activeTab === 'fin_dashboard' && (
                            <div className="glass-card p-10 rounded-[3rem] text-center border-t-8 border-slate-800 fade-in shadow-xl">
                                <Icon name="trending-up" size={48} className="mx-auto mb-4 text-slate-300"/>
                                <h2 className="text-2xl font-black uppercase text-slate-800">Módulo Financeiro Integrado</h2>
                                <p className="text-xs font-bold text-slate-500 uppercase mt-2">Os seus lançamentos e caixas diários estão a carregar aqui.</p>
                            </div>
                        )}

                        {activeTab === 'insumos' && (
                            <div className="space-y-6 fade-in">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-6 rounded-[2rem] border shadow-sm">
                                    <div>
                                        <h2 className="text-sm font-black uppercase tracking-widest text-slate-800">Gestão de Insumos</h2>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">Matéria-prima cadastrada: {ingredients.length} itens</p>
                                    </div>
                                    <div className="flex gap-2 w-full md:w-auto overflow-x-auto pb-1">
                                        <input type="file" accept=".json" className="hidden" ref={fileInputRef} onChange={handleFileImport} />
                                        <button onClick={() => fileInputRef.current.click()} className="shrink-0 bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-3 rounded-xl flex items-center justify-center gap-2 text-[9px] font-black uppercase transition-all">
                                            <Icon name="upload" size={14}/> Arquivo .JSON
                                        </button>
                                        <button onClick={handlePasteImport} className="shrink-0 bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-3 rounded-xl flex items-center justify-center gap-2 text-[9px] font-black uppercase transition-all border border-blue-200">
                                            <Icon name="copy" size={14}/> Colar Dados
                                        </button>
                                        <button onClick={() => openIngModal()} className="shrink-0 btn-accent px-6 py-3 rounded-xl flex items-center justify-center gap-2 text-[10px]">
                                            <Icon name="plus" size={14}/> Novo Insumo
                                        </button>
                                    </div>
                                </div>

                                <div className="glass-card rounded-[2.5rem] overflow-hidden border shadow-sm overflow-x-auto">
                                    <table className="w-full text-left text-xs">
                                        <thead className="bg-slate-100 border-b text-[10px] font-black text-slate-500 uppercase tracking-widest">
                                            <tr>
                                                <th className="p-4">Ingrediente</th>
                                                <th className="p-4">Categoria</th>
                                                <th className="p-4">Preço (Embalagem)</th>
                                                <th className="p-4">Custo Unitário</th>
                                                <th className="p-4 text-right">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 font-semibold text-slate-700">
                                            {ingredients.length === 0 ? (
                                                <tr><td colSpan="5" className="p-12 text-center text-slate-400 uppercase font-black text-xs">Nenhum insumo cadastrado.</td></tr>
                                            ) : ingredients.sort((a,b)=>a.name.localeCompare(b.name)).map(ing => {
                                                const unitCost = ing.cost / ing.qty;
                                                return (
                                                    <tr key={ing.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-4 font-black uppercase text-slate-900">{ing.name}</td>
                                                        <td className="p-4"><span className="bg-slate-200 text-slate-700 px-2.5 py-1 rounded-lg text-[9px] uppercase font-black">{ing.category}</span></td>
                                                        <td className="p-4">{formatMoney(ing.cost)} <span className="text-[9px] text-slate-400">/ {ing.qty}{ing.unit}</span></td>
                                                        <td className="p-4 text-emerald-600 font-black">{formatMoney(unitCost)} <span className="text-[9px] text-slate-400">/ {ing.unit === 'kg' ? 'g' : (ing.unit === 'L' ? 'ml' : ing.unit)}</span></td>
                                                        <td className="p-4 text-right">
                                                            <button onClick={() => openIngModal(ing)} className="text-blue-500 hover:text-blue-700 p-2"><Icon name="edit-2" size={16}/></button>
                                                            <button onClick={() => handleDeleteIngredient(ing.id)} className="text-red-400 hover:text-red-600 p-2"><Icon name="trash-2" size={16}/></button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* ======================= ABA FICHAS TÉCNICAS ======================= */}
                        {activeTab === 'fichas' && (
                            <div className="space-y-6 fade-in">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-[2rem] border shadow-sm">
                                    <div>
                                        <h2 className="text-sm font-black uppercase tracking-widest text-slate-800">Fichas Técnicas (Produtos)</h2>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">Precifique os burgers e porções.</p>
                                    </div>
                                    <button onClick={() => openRecipeModal()} className="w-full md:w-auto btn-accent px-6 py-3 rounded-xl flex items-center justify-center gap-2 text-[10px]">
                                        <Icon name="plus" size={14}/> Criar Ficha
                                    </button>
                                </div>

                                {/* Barra de Pesquisa e Filtros */}
                                <div className="bg-white p-4 rounded-[1.5rem] border shadow-sm flex flex-col md:flex-row gap-3">
                                    <div className="relative flex-1">
                                        <Icon name="search" size={16} className="absolute left-4 top-3 text-slate-400" />
                                        <input type="text" placeholder="Procurar receitas..." className="w-full pl-12 pr-4 py-2.5 bg-slate-50 border rounded-xl text-xs font-bold outline-none focus:border-[#F27A18]" value={recipeSearch} onChange={e=>setRecipeSearch(e.target.value)} />
                                    </div>
                                    <select className="p-2.5 bg-slate-50 border rounded-xl font-bold text-xs outline-none focus:border-[#F27A18]" value={recipeCatFilter} onChange={e=>setRecipeCatFilter(e.target.value)}>
                                        <option value="">Todas as Categorias</option>
                                        {recipeCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>

                                {filteredRecipes.length === 0 ? (
                                    <div className="p-12 text-center text-slate-400 uppercase font-black text-xs glass-card rounded-[2.5rem] border-dashed">Nenhuma ficha técnica encontrada.</div>
                                ) : (
                                    <div className="space-y-8">
                                        {sortedCategories.map(category => {
                                            const isCollapsed = recipeCollapsed[category];
                                            return (
                                            <div key={category} className="space-y-4">
                                                
                                                {/* Cabeçalho da Categoria com Toggle */}
                                                <div className="flex justify-between items-center border-b-2 border-slate-200 pb-2 cursor-pointer hover:opacity-80 transition-opacity select-none" onClick={() => toggleRecipeCat(category)}>
                                                    <div className="flex items-center gap-3 ml-2">
                                                        <span className="text-[#F27A18]"><Icon name="layers" size={20}/></span>
                                                        <h3 className="font-black text-sm uppercase text-slate-800 tracking-widest">{category}</h3>
                                                        <span className="bg-slate-200 text-slate-600 px-2 py-0.5 rounded text-[10px] uppercase font-black">{groupedRecipes[category].length}</span>
                                                    </div>
                                                    <Icon name={isCollapsed ? "chevron-down" : "chevron-up"} size={20} className="text-slate-400 mr-2"/>
                                                </div>

                                                {/* Grid de Fichas (Rica em Dados) */}
                                                {!isCollapsed && (
                                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                                        {groupedRecipes[category].sort((a,b)=>a.name.localeCompare(b.name)).map(recipe => {
                                                            // Lógica de Preços (Sistema Antigo)
                                                            const foodCost = calculateItemCost(recipe.ingredients);
                                                            const sellingPrice = parseFloat(recipe.sellingPrice || 0);
                                                            const cmv = sellingPrice > 0 ? ((foodCost / sellingPrice) * 100).toFixed(1) : 0;
                                                            
                                                            const taxPercent = parseFloat(cmvSettings.tax || 0);
                                                            const appsPercent = parseFloat(cmvSettings.apps || 0);
                                                            const cardPercent = parseFloat(cmvSettings.card || 0);
                                                            const targetCmvPercent = parseFloat(cmvSettings.targetCMV || 30);
                                                            const ifoodTaxPercent = parseFloat(cmvSettings.ifoodTax || 0);

                                                            const totalTaxesVal = sellingPrice * ((taxPercent + appsPercent + cardPercent) / 100);
                                                            const marginValue = sellingPrice - foodCost - totalTaxesVal;
                                                            const marginPercentage = sellingPrice > 0 ? ((marginValue / sellingPrice) * 100).toFixed(1) : 0;

                                                            const suggested = targetCmvPercent > 0 ? foodCost / (targetCmvPercent / 100) : 0;
                                                            const ifoodPrice = sellingPrice > 0 ? (sellingPrice / (1 - (ifoodTaxPercent / 100))) : (suggested / (1 - (ifoodTaxPercent / 100)));

                                                            // Separação de Embalagens
                                                            const mainItems = [];
                                                            const packagingItems = [];
                                                            
                                                            (recipe.ingredients || []).forEach(item => {
                                                                const ing = ingredients.find(i => i.id === item.ingredientId);
                                                                if (ing) {
                                                                    const isPkg = (ing.category || '').toLowerCase().includes('embalage');
                                                                    const lineCost = getIngredientUnitCost(ing.id, item.qty);
                                                                    const itemData = { name: ing.name, qty: item.qty, unit: ing.unit, cost: lineCost };
                                                                    if (isPkg) packagingItems.push(itemData);
                                                                    else mainItems.push(itemData);
                                                                }
                                                            });

                                                            return (
                                                                <div key={recipe.id} className={"glass-card rounded-[2rem] p-6 shadow-xl flex flex-col justify-between border-t-4 transition-all hover:shadow-2xl " + (recipe.ignoreCMV ? "opacity-80 border-slate-400" : "border-[#1A202C]")}>
                                                                    
                                                                    {/* Topo do Card */}
                                                                    <div>
                                                                        <div className="flex justify-between items-center mb-3">
                                                                            <span className={"px-2.5 py-1 rounded-lg text-[8px] font-black uppercase tracking-widest border " + getRecipeCategoryStyle(category)}>{category}</span>
                                                                            <div className="flex gap-1.5">
                                                                                <button onClick={() => handleDuplicateRecipe(recipe)} className="bg-slate-100 border border-slate-200 text-slate-500 hover:text-slate-800 p-1.5 rounded-lg transition-colors" title="Duplicar"><Icon name="copy" size={14}/></button>
                                                                                <button onClick={() => openRecipeModal(recipe)} className="bg-slate-100 border border-slate-200 text-blue-500 hover:text-blue-700 p-1.5 rounded-lg transition-colors" title="Editar"><Icon name="edit-2" size={14}/></button>
                                                                                <button onClick={() => handleDeleteRecipe(recipe.id)} className="bg-slate-100 border border-slate-200 text-red-400 hover:text-red-600 p-1.5 rounded-lg transition-colors" title="Excluir"><Icon name="trash-2" size={14}/></button>
                                                                            </div>
                                                                        </div>
                                                                        
                                                                        <h4 className="font-black text-lg text-slate-900 leading-tight flex items-center flex-wrap gap-2">
                                                                            {recipe.name} 
                                                                            {recipe.ignoreCMV && <span className="px-2 py-0.5 rounded text-[8px] font-black bg-slate-200 text-slate-500 uppercase tracking-widest"><Icon name="eye-off" size={10} className="inline mr-1 mb-0.5"/>CMV Ignorado</span>}
                                                                        </h4>

                                                                        {/* Box de Ingredientes (Estilo Antigo) */}
                                                                        <div className="mt-4 p-4 bg-slate-50 border border-slate-200 rounded-xl text-xs space-y-3 shadow-inner">
                                                                            <div>
                                                                                <p className="font-black text-[9px] text-slate-400 uppercase tracking-widest mb-1.5">Ingredientes Principais</p>
                                                                                <div className="divide-y divide-slate-200 font-bold text-slate-700">
                                                                                    {mainItems.length === 0 ? <p className="text-slate-400 italic text-[10px]">Sem itens.</p> : mainItems.map((mi, idx) => (
                                                                                        <div key={idx} className="flex justify-between items-center py-1">
                                                                                            <span className="truncate pr-2">• {mi.name} <span className="text-slate-400 font-normal">({mi.qty}{mi.unit})</span></span>
                                                                                            <span className="text-slate-900">{formatMoney(mi.cost)}</span>
                                                                                        </div>
                                                                                    ))}
                                                                                </div>
                                                                            </div>

                                                                            {packagingItems.length > 0 && (
                                                                                <div className="pt-2 border-t border-slate-200">
                                                                                    <p className="font-black text-[8px] text-slate-400 uppercase tracking-widest mb-1.5 flex items-center gap-1"><Icon name="package" size={10}/> Embalagens & Sup.</p>
                                                                                    <div className="divide-y divide-slate-200 font-bold text-slate-700">
                                                                                        {packagingItems.map((pi, idx) => (
                                                                                            <div key={idx} className="flex justify-between items-center py-1 text-[10px]">
                                                                                                <span className="truncate pr-2">• {pi.name} <span className="text-slate-400 font-normal">({pi.qty}{pi.unit})</span></span>
                                                                                                <span className="text-slate-900">{formatMoney(pi.cost)}</span>
                                                                                            </div>
                                                                                        ))}
                                                                                    </div>
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    </div>

                                                                    {/* Box Financeiro Inferior (Estilo Antigo) */}
                                                                    <div className="space-y-4 pt-4 mt-2">
                                                                        {/* CMV e Custo */}
                                                                        <div className="grid grid-cols-2 gap-3 text-center">
                                                                            <div className="bg-white border shadow-sm p-3 rounded-xl flex flex-col justify-center">
                                                                                <span className="text-[8px] text-slate-400 uppercase font-black tracking-widest leading-tight">Custo Alimento<br/>(CMV R$)</span>
                                                                                <span className="text-base font-black text-slate-900 mt-1">{formatMoney(foodCost)}</span>
                                                                            </div>
                                                                            <div className={"border shadow-sm p-3 rounded-xl flex flex-col justify-center " + (recipe.ignoreCMV ? "bg-slate-50 border-slate-200" : (parseFloat(cmv) > targetCmvPercent ? "bg-red-50 border-red-200" : "bg-green-50 border-green-200"))}>
                                                                                <span className="text-[8px] text-slate-400 uppercase font-black tracking-widest leading-tight">CMV Real (%)</span>
                                                                                <span className={"text-lg font-black mt-1 " + (recipe.ignoreCMV ? "text-slate-500" : (parseFloat(cmv) > targetCmvPercent ? "text-red-600" : "text-green-600"))}>{cmv}%</span>
                                                                            </div>
                                                                        </div>

                                                                        {/* Listagem de Margens */}
                                                                        <div className="space-y-1.5 text-xs border-t border-slate-200 pt-3">
                                                                            <div className="flex justify-between items-center font-bold">
                                                                                <span className="text-slate-600">Preço Atual Venda:</span>
                                                                                <span className="font-black text-slate-900 text-sm">{formatMoney(sellingPrice)}</span>
                                                                            </div>
                                                                            <div className="flex justify-between items-center text-slate-400 font-semibold text-[10px]">
                                                                                <span>Impostos e Taxas Totais:</span>
                                                                                <span>{formatMoney(totalTaxesVal)}</span>
                                                                            </div>
                                                                            <div className="flex justify-between items-center font-bold pt-1 border-t border-slate-100">
                                                                                <span className="text-slate-600 text-[10px] uppercase tracking-widest">Margem Lucro Op.:</span>
                                                                                <span className={"text-sm font-black " + (marginValue > 0 ? 'text-green-600' : 'text-red-500')}>{formatMoney(marginValue)} <span className="text-[10px]">({marginPercentage}%)</span></span>
                                                                            </div>
                                                                        </div>

                                                                        {/* Sugestões de Preço */}
                                                                        <div className="grid grid-cols-2 gap-2 mt-2">
                                                                            <div className="bg-slate-50 p-2 rounded-lg border border-slate-200 text-center">
                                                                                <span className="text-[8px] font-black text-slate-400 uppercase block mb-0.5">Sugestão Salão</span>
                                                                                <span className="text-xs font-black text-green-600">{formatMoney(suggested)}</span>
                                                                            </div>
                                                                            <div className="bg-red-50/50 p-2 rounded-lg border border-red-100 text-center">
                                                                                <span className="text-[8px] font-black text-red-400 uppercase block mb-0.5">Sugestão iFood</span>
                                                                                <span className="text-xs font-black text-red-600">{formatMoney(ifoodPrice)}</span>
                                                                            </div>
                                                                        </div>
                                                                    </div>

                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ======================= MODAL DA FICHA TÉCNICA ======================= */}
                        {isRecipeModalOpen && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 rounded-[2.5rem] shadow-2xl flex flex-col gap-6 scale-up-center">
                                    <div className="flex justify-between items-center border-b pb-3">
                                        <h3 className="text-sm font-black uppercase text-slate-800">{recipeForm.id ? 'Editar Ficha Técnica' : 'Nova Ficha Técnica'}</h3>
                                        <button onClick={()=>setIsRecipeModalOpen(false)} className="text-slate-400 hover:text-slate-800"><Icon name="x" size={20}/></button>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Nome do Produto</label>
                                            <input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none focus:border-[#F27A18]" placeholder="Ex: Tribo Burger Clássico" value={recipeForm.name} onChange={e=>setRecipeForm({...recipeForm, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Preço de Venda Praticado (R$)</label>
                                            <input type="number" step="0.01" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none focus:border-[#F27A18]" placeholder="Ex: 35.90" value={recipeForm.sellingPrice} onChange={e=>setRecipeForm({...recipeForm, sellingPrice: e.target.value})} />
                                        </div>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-1">Categoria do Produto</label>
                                        <select className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none" value={recipeForm.category} onChange={e=>setRecipeForm({...recipeForm, category: e.target.value})}>
                                            {recipeCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="flex items-center gap-3 bg-slate-50 border border-slate-200 p-4 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
                                            <input type="checkbox" className="w-4 h-4 accent-[#F27A18]" checked={recipeForm.ignoreCMV} onChange={e=>setRecipeForm({...recipeForm, ignoreCMV: e.target.checked})} />
                                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Não considerar para o cálculo de CMV Geral (Ignorar)</span>
                                        </label>
                                    </div>

                                    <div className="border-t pt-4">
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="text-[10px] font-black uppercase text-slate-800">Composição (Ingredientes)</label>
                                            <button type="button" onClick={addRecipeIngredient} className="text-[9px] font-black uppercase bg-[#1A202C] text-[#F8CC82] px-4 py-2 rounded-xl hover:bg-black flex items-center gap-1 shadow"><Icon name="plus" size={14}/> Adicionar Item</button>
                                        </div>

                                        <div className="space-y-2">
                                            {recipeForm.ingredients.length === 0 && <p className="text-center text-[10px] uppercase font-bold text-slate-400 py-6 bg-slate-50 rounded-2xl border border-dashed">Nenhum ingrediente adicionado.</p>}
                                            {recipeForm.ingredients.map((ingItem, idx) => (
                                                <div key={idx} className="flex flex-col sm:flex-row items-center gap-2 bg-slate-50 p-2 rounded-xl border">
                                                    <select className="w-full sm:flex-1 p-3 bg-white border rounded-lg font-bold text-[10px] outline-none" value={ingItem.ingredientId} onChange={e => updateRecipeIngredient(idx, 'ingredientId', e.target.value)}>
                                                        <option value="">-- Selecione o Insumo --</option>
                                                        {ingredients.sort((a,b)=>a.name.localeCompare(b.name)).map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                                                    </select>
                                                    <div className="flex w-full sm:w-auto gap-2">
                                                        <input type="number" step="0.001" placeholder="Qtd" className="w-full sm:w-24 p-3 bg-white border rounded-lg font-bold text-[10px] text-center outline-none" value={ingItem.qty} onChange={e => updateRecipeIngredient(idx, 'qty', e.target.value)} />
                                                        <button type="button" onClick={() => removeRecipeIngredient(idx)} className="p-3 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 border border-red-100 shrink-0"><Icon name="trash-2" size={14}/></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Resumo ao vivo do custo do modal */}
                                    <div className="bg-slate-800 text-white p-5 rounded-3xl flex justify-between items-center shadow-inner mt-2">
                                        <div className="text-left">
                                            <span className="text-[9px] font-black uppercase text-slate-400 block mb-1">Custo Total de Produção</span>
                                            <span className="text-2xl font-black text-[#F8CC82]">{formatMoney(calculateItemCost(recipeForm.ingredients))}</span>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[9px] font-black uppercase text-slate-400 block mb-1">CMV Estimado</span>
                                            <span className={"text-2xl font-black " + ((recipeForm.sellingPrice && (calculateItemCost(recipeForm.ingredients) / recipeForm.sellingPrice)*100 > parseFloat(cmvSettings.targetCMV||30)) ? "text-red-400" : "text-emerald-400")}>
                                                {recipeForm.sellingPrice > 0 ? ((calculateItemCost(recipeForm.ingredients) / recipeForm.sellingPrice) * 100).toFixed(1) : 0}%
                                            </span>
                                        </div>
                                    </div>

                                    <div className="flex gap-2 mt-2 pt-4 border-t">
                                        <button onClick={handleSaveRecipe} className="flex-1 btn-accent p-4 rounded-2xl text-[10px]">Gravar Ficha Técnica</button>
                                        <button onClick={()=>setIsRecipeModalOpen(false)} className="px-8 bg-slate-200 text-slate-600 font-black uppercase text-[10px] rounded-2xl">Cancelar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Modais Antigos de Manutenção */}
                        {isIngModalOpen && activeTab === 'insumos' && (
                            <div/>
                        )}

                        {['combos', 'saldos', 'vendas', 'dre'].includes(activeTab) && (
                            <div className="glass-card p-12 rounded-[3rem] text-center shadow-sm flex flex-col justify-center items-center gap-4">
                                <Icon name="sprout" size={40} className="text-emerald-400" />
                                <h2 className="text-xl font-black uppercase text-slate-800">Em Construção</h2>
                                <p className="text-xs font-bold text-slate-500 uppercase">A aba <strong>{activeTab.toUpperCase()}</strong> será implementada na Etapa 3.</p>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
