                                    </div>
                                    
                                    <div className="space-y-3">
                                        <h2 className="font-black uppercase text-slate-800 border-b-2 pb-1.5 flex items-center gap-1.5"><Icon name="trending-up" size={14} className="text-emerald-600" /> Fundos & Aplicações</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                                            {accounts.filter(a => a.type === 'corrente' && ['FUNDO', 'APLICAÇÃO', 'APLICACAO', 'INVESTIMENTO', 'RESERVA', 'POUPANÇA', 'POUPANCA'].some(k => (a.name||'').toUpperCase().includes(k)) && !['MERCADO PAGO', 'C6 BANK', 'IFOOD', 'CAIXA LOJA'].includes((a.name||'').trim().toUpperCase())).map(acc => (
                                                <div key={acc.id} className="glass-card p-4 rounded-xl border-l-4 border-emerald-500 flex flex-col justify-center items-center bg-emerald-50/20">
                                                    <span className="font-black text-slate-500 uppercase tracking-widest text-[9px]">{acc.name}</span>
                                                    <h3 className={"text-lg font-black mt-1 " + (accountBalances[acc.name]>=0?'text-emerald-700':'text-red-500')}>{formatMoney(accountBalances[acc.name] || 0)}</h3>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <h2 className="font-black uppercase text-slate-800 border-b-2 pb-1.5 flex items-center gap-1.5"><Icon name="wallet" size={14} className="text-slate-500" /> Outras Contas Operacionais</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                                            {accounts.filter(a => a.type === 'corrente' && !['MERCADO PAGO', 'C6 BANK', 'IFOOD', 'CAIXA LOJA'].includes((a.name||'').trim().toUpperCase()) && !['FUNDO', 'APLICAÇÃO', 'APLICACAO', 'INVESTIMENTO', 'RESERVA', 'POUPANÇA', 'POUPANCA'].some(k => (a.name||'').toUpperCase().includes(k))).map(acc => (
                                                <div key={acc.id} className="glass-card p-4 rounded-xl border-l-4 border-[#1A202C] flex flex-col justify-center items-center">
                                                    <span className="font-black text-slate-400 uppercase tracking-widest text-[9px]">{acc.name}</span>
                                                    <h3 className={"text-base font-black mt-1 " + (accountBalances[acc.name]>=0?'text-slate-800':'text-red-500')}>{formatMoney(accountBalances[acc.name] || 0)}</h3>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ABA: CAIXA DE VENDAS DIÁRIO */}
                            {activeTab === 'vendas' && (
                                <div className="space-y-4 fade-in">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="stat-banner !border-black !bg-[#D97757] p-4 rounded-xl text-center"><p className="font-black uppercase tracking-wider text-white opacity-80 mb-1">Faturamento Bruto Acumulado</p><h3 className="text-2xl font-black text-white">{formatMoney(stats.rb)}</h3></div>
                                        <div className="stat-banner !border-black !bg-slate-800 p-4 rounded-xl text-center"><p className="font-black uppercase tracking-wider text-slate-400 mb-1">Taxas de Operação Retidas (Máquinas)</p><h3 className="text-2xl font-black text-red-400">-{formatMoney(stats.autoCardFees)}</h3></div>
                                    </div>
                                    <div className="flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
                                        <div className="flex items-center gap-2"><Icon name="calendar-days" className="text-slate-400" /><h2 className="font-black uppercase tracking-widest">Caixa Diário</h2></div>
                                        <div className="flex items-center gap-2 bg-slate-50 p-1.5 rounded-xl border"><input type="date" className="font-bold bg-transparent outline-none border-0" value={newDayDate} onChange={e=>setNewDayDate(e.target.value)} /><button onClick={()=>db.collection(`artifacts/tribo-burger-financeiro/users/${user.uid}/dailyRecords`).doc(newDayDate).set({initialized:true},{merge:true})} className="bg-black text-[#F8CC82] px-3 py-1.5 rounded-lg font-black uppercase">Abrir Dia</button></div>
                                    </div>
                                    <div className="glass-card rounded-xl overflow-hidden border shadow-sm overflow-x-auto no-scrollbar">
                                        <table className="w-full text-center min-w-[1300px]">
                                            <thead className="bg-[#1A202C] text-white uppercase text-[9px] border-b">
                                                <tr><th className="p-3 sticky left-0 z-20 bg-[#1A202C]">Data Caixa</th><th className="p-3 bg-amber-500 text-black">Total Dia</th><th className="p-3 bg-blue-600 text-white">Pedidos</th><th className="p-3">Pix</th><th className="p-3">Dinheiro</th><th className="p-3 text-orange-400 bg-orange-950">Débito</th><th className="p-3 text-orange-400 bg-orange-950">Crédito</th><th className="p-3">Ifood</th><th className="p-3">Motoboy</th></tr>
                                            </thead>
                                            <tbody className="divide-y font-bold text-[10px]">
                                                {salesDays.map(d => {
                                                    const r = dailyRecords[d] || {}; const total = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc,f)=>acc+p(r[f]), 0);
                                                    return (
                                                        <tr key={d} className="hover:bg-slate-50">
                                                            <td className="p-2 border-r bg-white sticky left-0 text-center font-black">{d.split('-').reverse().join('/')}</td>
                                                            <td className="p-2 bg-yellow-50 font-black text-slate-900">{formatMoney(total)}</td>
                                                            <td className="p-0 border-r bg-blue-50/30"><DailyInput dateStr={d} field="qtdPedidos" initialValue={r.qtdPedidos} activeUid={user.uid} className="!text-blue-700" placeholder="0" /></td>
                                                            <td className="p-0 border-r"><DailyInput dateStr={d} field="pix" initialValue={r.pix} activeUid={user.uid} /></td>
                                                            <td className="p-0 border-r"><DailyInput dateStr={d} field="dinheiro" initialValue={r.dinheiro} activeUid={user.uid} /></td>
                                                            <td className="p-0 border-r bg-orange-50/20"><DailyInput dateStr={d} field="debito" initialValue={r.debito} activeUid={user.uid} /></td>
                                                            <td className="p-0 border-r bg-orange-50/20"><DailyInput dateStr={d} field="credito" initialValue={r.credito} activeUid={user.uid} /></td>
                                                            <td className="p-0 border-r"><DailyInput dateStr={d} field="ifood" initialValue={r.ifood} activeUid={user.uid} /></td>
                                                            <td className="p-0 border-r"><DailyInput dateStr={d} field="motoboy" initialValue={r.motoboy} activeUid={user.uid} className="!text-red-500" /></td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                            <tfoot>
                                                <tr className="bg-[#1A202C] text-white font-black uppercase border-t-4 border-[#D97757]">
                                                    <td className="p-0 sticky left-0 bg-[#1A202C] z-10 text-center text-amber-300">SOMA TOTAL</td>
                                                    <td className="p-2 bg-amber-500 text-black">{formatMoney(columnTotals.totalDia)}</td>
                                                    <td className="p-2 bg-blue-600">{columnTotals.pedidos}</td>
                                                    <td className="p-2 bg-blue-800 text-[#F8CC82]">{formatMoney(columnTotals.pedidos > 0 ? columnTotals.totalDia / columnTotals.pedidos : 0)}</td>
                                                    {['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].map(f => ( <td key={f} className="p-2 border-r bg-slate-800">{formatMoney(columnTotals[f])}</td> ))}
                                                    <td className="p-2 border-r text-orange-400 bg-orange-950/25">{formatMoney(columnTotals.taxaEntrega)}</td>
                                                    <td className="p-2 border-r text-red-400 bg-red-950/25">{formatMoney(columnTotals.motoboy)}</td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* ABA: CONTAS A PAGAR */}
                            {activeTab === 'a_pagar' && (
                                <div className="space-y-4 fade-in">
                                    <div className="stat-banner !border-black !bg-red-500 p-5 rounded-xl text-center"><p className="font-black uppercase tracking-wider text-white opacity-80 mb-1">Total Geral de Provisões A Pagar</p><h3 className="text-3xl font-black text-white">{formatMoney(totalAPagar)}</h3></div>
                                    <div className="glass-card rounded-xl overflow-hidden border shadow-sm">
                                        <table className="w-full text-left text-[11px]">
                                            <thead className="bg-slate-100 text-slate-500 font-black uppercase tracking-widest border-b"><tr><th className="p-3">Vencimento</th><th className="p-3">Descrição Operação</th><th className="p-3">Conta Alocada</th><th className="p-3 text-right">Valor Custo</th><th className="p-3 text-center">Ação</th></tr></thead>
                                            <tbody className="divide-y font-bold text-slate-700">
                                                {consolidatedAPagar.length === 0 ? <tr><td colSpan="5" className="p-8 text-center text-slate-400 uppercase">Nenhuma conta pendente para o período selecionado.</td></tr> : consolidatedAPagar.map((t, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50">
                                                        <td className="p-3 text-slate-800">{t.clearanceDate.split('-').reverse().join('/')}</td>
                                                        <td className="p-3 uppercase">{t.description}</td>
                                                        <td className="p-3 uppercase"><span className="bg-slate-200 px-2 py-0.5 rounded text-[9px] font-black">{t.account}</span></td>
                                                        <td className="p-3 text-right text-red-500 font-black">{formatMoney(t.amount)}</td>
                                                        <td className="p-3 text-center"><button onClick={()=>openLiquidation(t)} className="bg-green-100 text-green-700 px-3 py-1.5 rounded-lg font-black text-[9px] uppercase">Dar Baixa</button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* ABA: CONTAS A RECEBER */}
                            {activeTab === 'a_receber' && (
                                <div className="space-y-4 fade-in">
                                    <div className="stat-banner !border-black !bg-green-500 p-5 rounded-xl text-center"><p className="font-black uppercase tracking-wider text-white opacity-80 mb-1">Total Geral de Provisões A Receber</p><h3 className="text-3xl font-black text-white">{formatMoney(totalReceitasPendentes)}</h3></div>
                                    <div className="glass-card rounded-xl overflow-hidden border shadow-sm">
                                        <table className="w-full text-left text-[11px]">
                                            <thead className="bg-slate-100 text-slate-500 font-black uppercase tracking-widest border-b"><tr><th className="p-3">Previsão Liberação</th><th className="p-3">Descrição Receita</th><th className="p-3">Conta Destino</th><th className="p-3 text-right">Valor Bruto</th><th className="p-3 text-center">Ação</th></tr></thead>
                                            <tbody className="divide-y font-bold text-slate-700">
                                                {consolidatedAReceber.length === 0 ? <tr><td colSpan="5" className="p-8 text-center text-slate-400 uppercase">Nenhum recebimento provisionado em agenda.</td></tr> : consolidatedAReceber.map((t) => (
                                                    <tr key={t.id} className="hover:bg-slate-50">
                                                        <td className="p-3 text-slate-800">{t.clearanceDate?.split('-').reverse().join('/')}</td>
                                                        <td className="p-3 uppercase">{t.description}</td>
                                                        <td className="p-3 uppercase"><span className="bg-slate-200 px-2 py-0.5 rounded text-[9px] font-black">{t.account}</span></td>
                                                        <td className="p-3 text-right text-green-600 font-black">{formatMoney(t.amount)}</td>
                                                        <td className="p-3 text-center"><button onClick={()=>openLiquidation(t)} className="bg-green-100 text-green-700 px-3 py-1.5 rounded-lg font-black text-[9px] uppercase">Liquidar Caixa</button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* ABA: GESTÃO DE FATURAS DE CARTÃO */}
                            {activeTab === 'cartoes' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">
                                    {cardStats.map(card => {
                                        const currentMonthTxs = transactions.filter(t => { if (t.account !== card.name) return false; const { clearanceDate } = getTransactionDates(t); return clearanceDate?.startsWith(filterMonth) && !isInvoicePayment(t); });
                                        const invoiceTotal = currentMonthTxs.reduce((acc, t) => t.type === 'saida' ? acc + p(t.amount) : acc - p(t.amount), 0);
                                        return (
                                            <div key={card.id} className="glass-card p-4 rounded-xl shadow border-t-4 border-slate-900 flex flex-col justify-between">
                                                <div className="flex justify-between border-b pb-2 mb-2"><h4 className="font-black text-slate-800 text-base">{card.name}</h4><Icon name="credit-card" size={20} className="text-slate-400"/></div>
                                                <div className="flex justify-between items-center py-2">
                                                    <div><span className="text-slate-400 block text-[8px] font-black">Fatura Prevista ({filterMonth})</span><h3 className="text-2xl font-black text-slate-800">{formatMoney(invoiceTotal)}</h3></div>
                                                    {invoiceTotal > 0 && <button onClick={() => setInvoiceModal({ cardName: card.name, total: invoiceTotal })} className="bg-black text-[#F8CC82] px-3 py-2 rounded-lg font-black text-[9px] uppercase shadow">Dar Baixa Fatura</button>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {/* ABA: ANÁLISE COMERCIAL E METAS */}
                            {activeTab === 'resultados' && (
                                <div className="space-y-6 fade-in">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                        <div className="glass-card p-4 rounded-xl text-center"><span className="text-slate-400 block font-black text-[8px]">Projeção Mensal Faturamento</span><h3 className="text-2xl font-black text-blue-600 mt-1">{formatMoney(stats.projecaoMensal)}</h3></div>
                                        <div className="glass-card p-4 rounded-xl text-center"><span className="text-slate-400 block font-black text-[8px]">Média de Faturamento Diário</span><h3 className="text-2xl font-black text-green-600 mt-1">{formatMoney(stats.ticketDiario)}</h3></div>
                                        <div className="glass-card p-4 rounded-xl text-center"><span className="text-slate-400 block font-black text-[8px]">Ticket Médio por Pedido</span><h3 className="text-2xl font-black text-purple-600 mt-1">{formatMoney(stats.ticketPedido)}</h3><p className="text-[8px] font-bold text-slate-400 uppercase mt-1">({stats.totalPedidos} Pedidos em {stats.diasAtivos} Dias)</p></div>
                                    </div>
                                    <div className="glass-card p-4 rounded-xl">
                                        <h3 className="font-black text-slate-800 mb-3 flex items-center gap-1.5 border-b pb-2"><Icon name="trending-up" size={14}/> Melhores Dias de Venda (Média Comercial)</h3>
                                        <div className="space-y-2.5">
                                            {stats.weekdayAverages.map((day, idx) => (
                                                <div key={day.name} className="flex justify-between items-center text-[10px] border-b pb-1 font-bold">
                                                    <span>{idx+1}º - {day.name} ({day.count} Dias Ativos)</span>
                                                    <span className="text-green-600 font-black">{formatMoney(day.avg)} / Dia</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ABA: DRE OPERACIONAL */}
                            {activeTab === 'dre' && (
                                <div className="max-w-2xl mx-auto glass-card rounded-xl p-5 shadow-xl border-t-4 border-[#D97757] fade-in">
                                    <h2 className="font-black uppercase text-center border-b pb-3 mb-3 text-base">Demonstração do Resultado do Exercício - {filterMonth}</h2>
                                    <div className="space-y-2.5 text-[10px] font-bold">
                                        <div className="flex justify-between p-2 bg-green-50 rounded font-black text-green-700"><span>(+) Receita Bruta Faturamento</span><span>{formatMoney(stats.rb)}</span></div>
                                        <div className="p-2 border rounded space-y-1 bg-slate-50/50">
                                            <span className="text-slate-400 block text-[8px] font-black">Despesas e Custos por Categoria</span>
                                            {Object.entries(stats.catCosts).map(([c, v]) => (
                                                <div key={c} className="flex justify-between text-slate-600 font-medium"><span>(-) {c}</span><span className="text-red-500 font-bold">{formatMoney(v)}</span></div>
                                            ))}
                                        </div>
                                        <div className={"flex justify-between items-center p-4 rounded-lg mt-3 text-sm font-black " + (stats.lucro >= 0 ? "bg-[#1A202C] text-[#F8CC82]" : "bg-red-600 text-white")}><span>(=) Resultado Líquido Operacional</span><span>{formatMoney(stats.lucro)}</span></div>
                                    </div>
                                </div>
                            )}

                            {/* ABA: FORNECEDORES COMPLETA */}
                            {activeTab === 'fornecedores' && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 fade-in">
                                    <div className="glass-card p-5 rounded-xl h-fit space-y-3"><h3 className="font-black uppercase text-slate-800 text-sm">Add Fornecedor Oficial</h3>
                                        <form onSubmit={addSupplier} className="space-y-3"><input type="text" className="w-full p-2.5 bg-slate-50 border rounded-xl font-bold outline-none" placeholder="Nome Fornecedor..." value={supForm} onChange={e=>setSupForm(e.target.value)} required /><button className="w-full bg-black text-[#F8CC82] p-2.5 rounded-lg font-black uppercase text-[10px]">Gravar Fornecedor</button></form>
                                    </div>
                                    <div className="md:col-span-2 glass-card rounded-xl overflow-hidden border shadow-sm">
                                        <table className="w-full text-left text-[11px] font-bold">
                                            <thead className="bg-slate-100 text-slate-500 uppercase tracking-widest border-b"><tr><th className="p-3">Nome Fornecedor</th><th className="p-3 text-right">Ação</th></tr></thead>
                                            <tbody className="divide-y text-slate-700">
                                                {suppliers.sort((a,b)=>a.name.localeCompare(b.name)).map(s => (
                                                    <tr key={s.id} className="hover:bg-slate-50">
                                                        <td className="p-3 uppercase">{s.name}</td>
                                                        <td className="p-3 text-right"><button onClick={() => executeDelete('suppliers', s.id)} className={"p-1.5 rounded " + (deleteConfirmId === s.id ? 'delete-confirm text-white' : 'text-red-400')} >{deleteConfirmId === s.id ? "SIM" : <Icon name="trash-2" size={12}/>}</button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
